<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeûne Premium + Suivi Poids</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
    --green:#2ecc71;
    --orange:#f39c12;
}

*{box-sizing:border-box}

body{
    margin:0;
    font-family:Inter;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* HEADER */
.header{
    width:100%;
    padding:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:15px;
    border:2px solid var(--green);
}

/* TIMER */
.timer{
    margin-top:10px;
    width:300px;
    height:300px;
    border-radius:50%;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
}

svg{
    position:absolute;
    transform:rotate(-90deg);
}

circle{
    fill:none;
    stroke-width:12;
}

.bg{ stroke:#1f2937; }

.progress{
    stroke:var(--green);
    stroke-linecap:round;
    transition:0.6s linear;
}

.time{
    font-size:3rem;
    font-weight:800;
}

.status{
    font-size:0.9rem;
    opacity:0.7;
}

/* CARD */
.card{
    margin-top:20px;
    width:90%;
    max-width:400px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
}

/* TIMELINE */
.timeline{
    width:90%;
    max-width:400px;
    margin-top:25px;
}

.step{
    display:flex;
    align-items:center;
    gap:10px;
    margin:15px 0;
    opacity:0.4;
    transition:0.4s;
}

.step::before{
    content:'';
    width:12px;
    height:12px;
    border-radius:50%;
    background:#555;
    transition:0.4s;
}

.step.active{
    opacity:1;
}

.step.active::before{
    background:var(--green);
    box-shadow:0 0 15px var(--green);
}

/* INPUT POIDS */
input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:var(--green);
    color:white;
    font-weight:bold;
}

ul{
    font-size:12px;
    opacity:0.8;
    padding-left:15px;
}

</style>
</head>

<body>

<div class="header">
    <img src="votre-photo.jpg" class="avatar">
    <div>
        <b>Hicham</b><br>
        <small>Jeûne + Suivi santé</small>
    </div>
</div>

<!-- TIMER -->
<div class="timer">

<svg width="300" height="300">
    <circle cx="150" cy="150" r="130" class="bg"></circle>
    <circle cx="150" cy="150" r="130" class="progress" id="circle"
        stroke-dasharray="816" stroke-dashoffset="0"></circle>
</svg>

<div class="time" id="time">00:00:00</div>
<div class="status" id="status">JEÛNE</div>

</div>

<!-- CARD METABOLIQUE -->
<div class="card">
    <h3 id="title">Etat du corps</h3>
    <p id="desc">Suivi métabolique en temps réel</p>
</div>

<!-- TIMELINE -->
<div class="timeline">
    <div class="step" id="p1">🩸 Glycémie</div>
    <div class="step" id="p2">📉 Insuline</div>
    <div class="step" id="p3">🔥 Graisses</div>
    <div class="step" id="p4">✨ Autophagie</div>
</div>

<!-- MODULE POIDS / IMC -->
<div class="card">
    <h3>📊 Suivi poids & IMC</h3>

    <input id="weightInput" type="number" placeholder="Ton poids (kg)">
    <button onclick="addWeight()">Ajouter poids</button>

    <p id="bmiText"></p>
    <ul id="history"></ul>
</div>

<script>

const circle = document.getElementById("circle");
const timeEl = document.getElementById("time");
const statusEl = document.getElementById("status");

const TOTAL = 816;

// jeûne 10h → 16h
const EAT_START = 10*3600;
const EAT_END = 16*3600;

// IMC
const HEIGHT = 1.82;
let weightHistory = [];

/* ================= TIMER ================= */

function update(){

    const now = new Date();
    const t = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();

    let fasting = true;
    let remain;

    if(t >= EAT_START && t < EAT_END){
        fasting = false;
        remain = EAT_END - t;
    } else {
        remain = t >= EAT_END
        ? 86400 - t + EAT_START
        : EAT_START - t;
    }

    const h = Math.floor(remain/3600);
    const m = Math.floor((remain%3600)/60);
    const s = remain%60;

    timeEl.innerText =
        `${h.toString().padStart(2,'0')}:`+
        `${m.toString().padStart(2,'0')}:`+
        `${s.toString().padStart(2,'0')}`;

    statusEl.innerText = fasting ? "JEÛNE 🔥" : "REPAS 🍽";

    circle.style.stroke =
        fasting ? "var(--green)" : "var(--orange)";

    circle.style.strokeDashoffset =
        TOTAL - (remain/(fasting ? 18*3600 : 6*3600))*TOTAL;

    updateTimeline(t);
}

/* ================= TIMELINE ================= */

function updateTimeline(seconds){

    const start = 16 * 3600;

    let elapsed;

    if(seconds >= start){
        elapsed = seconds - start;
    } else {
        elapsed = (24*3600 - start) + seconds;
    }

    const percent = elapsed / (18 * 3600);

    let phase = 1;

    if(percent < 0.25) phase = 1;
    else if(percent < 0.50) phase = 2;
    else if(percent < 0.75) phase = 3;
    else phase = 4;

    document.querySelectorAll(".step").forEach(e=>{
        e.classList.remove("active");
    });

    document.getElementById("p"+phase).classList.add("active");

    setCard(phase);
}

/* ================= CARD ================= */

function setCard(p){

    if(p===1){
        title="Glycémie";
        desc="Utilisation du glucose";
    }
    if(p===2){
        title="Insuline";
        desc="Transition métabolique";
    }
    if(p===3){
        title="Graisses";
        desc="Brûlage activé";
    }
    if(p===4){
        title="Autophagie";
        desc="Nettoyage cellulaire";
    }

    document.getElementById("title").innerText = title;
    document.getElementById("desc").innerText = desc;
}

/* ================= POIDS + IMC ================= */

function addWeight(){

    const w = parseFloat(document.getElementById("weightInput").value);
    if(!w) return;

    const bmi = (w/(HEIGHT*HEIGHT)).toFixed(1);

    weightHistory.push({
        date:new Date().toLocaleDateString(),
        weight:w,
        bmi:bmi
    });

    renderHistory();
    updateBMI(w,bmi);
    localStorage.setItem("weights",JSON.stringify(weightHistory));
}

function updateBMI(w,bmi){

    let status="";

    if(bmi<18.5) status="Maigreur";
    else if(bmi<25) status="Normal";
    else if(bmi<30) status="Surpoids";
    else status="Obésité";

    document.getElementById("bmiText").innerText =
        `Poids: ${w}kg | IMC: ${bmi} (${status})`;
}

function renderHistory(){

    const list = document.getElementById("history");
    list.innerHTML="";

    weightHistory.slice().reverse().forEach(i=>{
        const li=document.createElement("li");
        li.textContent=`${i.date} → ${i.weight}kg (IMC ${i.bmi})`;
        list.appendChild(li);
    });
}

function load(){
    const data = localStorage.getItem("weights");
    if(data){
        weightHistory = JSON.parse(data);
        renderHistory();
    }
}

load();

/* ================= LOOP ================= */

setInterval(update,1000);
update();

</script>

</body>
</html>
