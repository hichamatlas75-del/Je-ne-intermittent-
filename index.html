<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hicham - Master Jeûne 18/6</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --phase1: #60a5fa; --phase2: #818cf8; --phase3: #a78bfa; 
            --phase4: #f472b6; --phase5: #fbbf24;
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        .profile-img {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid var(--phase5);
            object-fit: cover;
            margin-bottom: 10px;
        }

        .timer-display {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* L'horloge SVG */
        .clock-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }

        svg { transform: rotate(-90deg); cursor: pointer; }
        
        path {
            transition: transform 0.3s, opacity 0.3s;
            opacity: 0.8;
        }
        path:hover { opacity: 1; transform: scale(1.02); }
        path.active { opacity: 1; stroke: white; stroke-width: 2px; }

        /* Le point qui indique l'heure actuelle */
        #current-time-marker {
            fill: white;
            stroke: var(--bg-dark);
            stroke-width: 2;
        }

        /* Carte d'info */
        .info-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px;
            margin-top: 20px;
            border-bottom: 5px solid var(--phase5);
            min-height: 150px;
            transition: all 0.5s ease;
        }

        .info-card h3 { margin-top: 0; color: var(--phase5); }
        .info-card p { font-size: 0.95rem; line-height: 1.6; color: #cbd5e1; }

        .btn-reset {
            margin-top: 15px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="app-container">
    <img src="votre-photo.jpg" alt="Hicham" class="profile-img">
    <div style="font-size: 1.2rem; font-weight: 300;">Hicham, objectif 18/6</div>
    <div id="timer" class="timer-display">00:00:00</div>

    <div class="clock-container">
        <svg viewBox="0 0 100 100" width="300" height="300">
            <!-- Phase 1: 16h-20h (4h) -->
            <path id="p1" d="M 50,50 L 50,5 A 45,45 0 0,1 89,27.5 Z" fill="var(--phase1)" onclick="showInfo(1)"></path>
            <!-- Phase 2: 20h-00h (4h) -->
            <path id="p2" d="M 50,50 L 89,27.5 A 45,45 0 0,1 89,72.5 Z" fill="var(--phase2)" onclick="showInfo(2)"></path>
            <!-- Phase 3: 00h-06h (6h) -->
            <path id="p3" d="M 50,50 L 89,72.5 A 45,45 0 0,1 5,50 Z" fill="var(--phase3)" onclick="showInfo(3)"></path>
            <!-- Phase 4: 06h-10h (4h) -->
            <path id="p4" d="M 50,50 L 5,50 A 45,45 0 0,1 27.5,11 Z" fill="var(--phase4)" onclick="showInfo(4)"></path>
            <!-- Phase 5: 10h-16h (6h) - ALIMENTATION -->
            <path id="p5" d="M 50,50 L 27.5,11 A 45,45 0 0,1 50,5 Z" fill="var(--phase5)" onclick="showInfo(5)"></path>
            
            <!-- Indicateur de l'heure actuelle -->
            <circle id="marker" cx="50" cy="5" r="3" fill="white" />
        </svg>
    </div>

    <div class="info-card" id="info-card">
        <h3 id="info-title">Cliquez sur une phase</h3>
        <p id="info-text">Découvrez les secrets de votre métabolisme en touchant les segments de l'horloge.</p>
        <button class="btn-reset" onclick="autoDetect()">Revenir à l'heure actuelle</button>
    </div>
</div>

<script>
    const phases = {
        1: { title: "⚡ Phase 1 : Digestion", color: "#60a5fa", text: "Hicham, votre corps traite votre dernier repas. L'insuline est active pour stocker l'énergie. Buvez de l'eau pour faciliter le transit." },
        2: { title: "📉 Phase 2 : Baisse d'Insuline", color: "#818cf8", text: "Le taux de sucre baisse. Votre corps commence à se calmer. C'est le moment idéal pour se relaxer avant de dormir." },
        3: { title: "🔥 Phase 3 : Mode Brûle-Graisse", color: "#a78bfa", text: "Pendant votre sommeil, le corps a épuisé le sucre et commence à brûler vos graisses pour fonctionner. Travail efficace !" },
        4: { title: "💎 Phase 4 : Autophagie (Élite)", color: "#f472b6", text: "Hicham, c'est l'étape royale ! Vos cellules s'auto-nettoient. Votre esprit est plus clair. Le café noir ou le thé sont vos alliés ici." },
        5: { title: "🍽️ Phase 5 : Alimentation", color: "#fbbf24", text: "Bon appétit ! Profitez de vos nutriments. C'est le moment de nourrir vos muscles et de savourer votre victoire du jour." }
    };

    function showInfo(id) {
        const card = document.getElementById('info-card');
        document.querySelectorAll('path').forEach(p => p.classList.remove('active'));
        document.getElementById('p'+id).classList.add('active');
        
        document.getElementById('info-title').innerText = phases[id].title;
        document.getElementById('info-title').style.color = phases[id].color;
        document.getElementById('info-text').innerText = phases[id].text;
        card.style.borderColor = phases[id].color;
    }

    function updateClock() {
        const now = new Date();
        const hrs = now.getHours();
        const mins = now.getMinutes();
        const secs = now.getSeconds();
        
        // Timer display
        document.getElementById('timer').innerText = 
            `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;

        // Rotation du marqueur blanc sur le cercle (360 degrés / 24h)
        const angle = ((hrs + mins/60) * 15) - 90; 
        const radius = 45;
        const x = 50 + radius * Math.cos(angle * Math.PI / 180);
        const y = 50 + radius * Math.sin(angle * Math.PI / 180);
        
        const marker = document.getElementById('marker');
        marker.setAttribute('cx', x);
        marker.setAttribute('cy', y);
    }

    function autoDetect() {
        const hrs = new Date().getHours();
        let current = 0;
        if (hrs >= 16 && hrs < 20) current = 1;
        else if (hrs >= 20 || hrs < 0) current = 2;
        else if (hrs >= 0 && hrs < 6) current = 3;
        else if (hrs >= 6 && hrs < 10) current = 4;
        else current = 5;
        showInfo(current);
    }

    setInterval(updateClock, 1000);
    updateClock();
    autoDetect(); // Lance la détection auto au démarrage
</script>

</body>
</html>
