<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Santé Pro Fix</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Inter;
    background:#0f172a;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-bottom:40px;
}

.header{
    width:100%;
    padding:20px;
    display:flex;
    gap:10px;
    align-items:center;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:15px;
    border:2px solid #2ecc71;
}

.grid{
    width:90%;
    max-width:450px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    backdrop-filter:blur(20px);
}

.big{
    grid-column:span 2;
}

input,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
    border:none;
}

button{
    background:#2ecc71;
    font-weight:bold;
}

.chat{
    height:200px;
    overflow-y:auto;
    font-size:13px;
    margin-bottom:10px;
}

.msg{
    margin:5px 0;
}

.user{color:#2ecc71;}
.bot{color:#f39c12;}

canvas{
    width:100%!important;
    height:200px!important;
}

.error{
    color:#ff6b6b;
    font-size:12px;
}

</style>
</head>

<body>

<div class="header">
    <img src="votre-photo.jpg" class="avatar">
    <div>
        <b>Hicham</b><br>
        <small>Dashboard corrigé</small>
    </div>
</div>

<div class="grid">

    <div class="card big">
        ⚖️ Ajouter poids
        <input id="weightInput" type="number" placeholder="kg">
        <button onclick="addWeight()">Ajouter</button>
        <div id="error" class="error"></div>
    </div>

    <div class="card big">
        📈 Evolution poids
        <canvas id="chart"></canvas>
    </div>

    <div class="card big">

        🧠 Coach IA

        <div class="chat" id="chat"></div>

        <input id="input" placeholder="Pose une question">
        <button onclick="ask()">Envoyer</button>

    </div>

</div>

<script>

/* ================= SAFE LOAD ================= */

let data = [];

try {
    data = JSON.parse(localStorage.getItem("wdata")) || [];
} catch(e){
    data = [];
}

/* ================= CHART INIT SAFE ================= */

const ctx = document.getElementById("chart").getContext("2d");

const chart = new Chart(ctx,{
    type:"line",
    data:{
        labels:[],
        datasets:[{
            label:"Poids (kg)",
            data:[],
            borderColor:"#2ecc71",
            tension:0.4
        }]
    },
    options:{
        responsive:true,
        plugins:{legend:{display:false}}
    }
});

/* ================= UPDATE CHART ================= */

function updateChart(){

    chart.data.labels = data.map(d=>d.date || "");
    chart.data.datasets[0].data = data.map(d=>d.w || 0);
    chart.update();
}

/* ================= WEIGHT ================= */

function addWeight(){

    const input = document.getElementById("weightInput");
    const error = document.getElementById("error");

    const w = parseFloat(input.value);

    if(!w || w <= 0){
        error.innerText = "⚠️ Entre un poids valide";
        return;
    }

    error.innerText = "";

    data.push({
        date:new Date().toLocaleDateString(),
        w:w
    });

    localStorage.setItem("wdata",JSON.stringify(data));

    input.value="";

    updateChart();
}

/* ================= CHAT ================= */

function addMsg(text,type){

    const div = document.createElement("div");
    div.className = "msg "+type;
    div.innerText = text;

    const chat = document.getElementById("chat");
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* ================= MEMORY SAFE ================= */

let memory = {
    lastWeight:null,
    streak:0
};

/* ================= IA ================= */

function ai(msg){

    let last = data.length ? data[data.length-1].w : null;

    if(last !== null){
        if(memory.lastWeight !== null && last < memory.lastWeight){
            memory.streak++;
        }
        memory.lastWeight = last;
    }

    if(msg.includes("poids")){
        return `📊 Dernier poids: ${last ?? "non défini"} kg`;
    }

    if(msg.includes("jeune")){
        return "🔥 Jeûne = utilisation des graisses après 12-16h";
    }

    if(msg.includes("graisse")){
        return "⚡ Lipolyse activée = combustion des graisses";
    }

    if(msg.includes("imc")){
        return "📏 IMC = poids / taille²";
    }

    if(msg.includes("motivation")){
        return memory.streak > 2
        ? "🔥 Excellente progression continue"
        : "💪 Continue la régularité";
    }

    return "🧠 Pose-moi question sur poids, jeûne, IMC, énergie";
}

/* ================= ASK ================= */

function ask(){

    const input = document.getElementById("input");

    const msg = input.value.trim();

    if(!msg) return;

    addMsg(msg,"user");

    setTimeout(()=>{
        addMsg(ai(msg),"bot");
    },400);

    input.value="";
}

/* ================= INIT ================= */

updateChart();

</script>

</body>
</html>
