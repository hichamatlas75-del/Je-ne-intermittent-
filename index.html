<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hicham Fasting Pro AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --green: #2ecc71; --orange: #f39c12; --dark: #090e1a; --card: #161c2d; --text: #ffffff; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(9,14,26,0.95); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .profile { display: flex; align-items: center; gap: 12px; }
        .profile img { width: 42px; height: 42px; border-radius: 12px; border: 2px solid var(--green); object-fit: cover; }
        .clock-ui { font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--green); }

        .main { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 20px; padding-bottom: 100px; }
        
        .timer-box { position: relative; width: 250px; height: 250px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--card); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        #countdown { font-size: 3.2rem; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .status-badge { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }

        .phases { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        .ph { background: var(--card); padding: 12px 5px; border-radius: 18px; text-align: center; opacity: 0.2; transition: 0.5s; }
        .ph.active { opacity: 1; border: 1px solid var(--green); background: rgba(46, 204, 113, 0.1); }
        .ph i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
        .ph span { font-size: 0.55rem; font-weight: 800; color: #64748b; }

        .drawer { position: fixed; bottom: 0; width: 100%; background: #0f172a; border-radius: 30px 30px 0 0; height: 85vh; transform: translateY(calc(100% - 65px)); transition: transform 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 1000; border-top: 1px solid rgba(255,255,255,0.1); }
        .drawer.open { transform: translateY(0); }
        .handle { width: 45px; height: 5px; background: #334155; border-radius: 10px; margin: 12px auto; }

        .tabs { display: flex; justify-content: space-around; padding: 5px; }
        .tab { font-size: 0.8rem; font-weight: 800; opacity: 0.4; color: white; cursor: pointer; padding: 10px; }
        .tab.active { opacity: 1; color: var(--green); border-bottom: 3px solid var(--green); }

        .section { display: none; padding: 20px; height: calc(100% - 130px); flex-direction: column; }
        .section.active { display: flex; }

        .chat-view { flex: 1; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 20px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .msg { padding: 12px; border-radius: 15px; font-size: 0.85rem; line-height: 1.4; max-width: 85%; }
        .msg.bot { background: #1e293b; align-self: flex-start; }
        .msg.user { background: var(--green); color: black; font-weight: 700; align-self: flex-end; }
        .typing { font-size: 0.7rem; color: var(--green); margin: 5px; display: none; font-weight: 600; }

        .chat-input { display: flex; gap: 8px; }
        .chat-input input { flex: 1; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; }
        .btn-send { background: var(--green); border: none; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        canvas { width: 100% !important; max-height: 200px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile">
            <img src="votre-photo.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Hicham&background=2ecc71&color=fff'">
            <div><div style="font-weight: 800; font-size: 1rem;">HICHAM</div><div style="font-size: 0.6rem; color: var(--green); font-weight: 800;">MASTER 18/6</div></div>
        </div>
        <div id="clock" class="clock-ui">00:00</div>
    </div>

    <div class="main">
        <div class="timer-box">
            <div id="status-label" class="status-badge">Analyse...</div>
            <h1 id="countdown">00:00:00</h1>
            <div id="target-ui" style="font-size: 0.7rem; color: #64748b; margin-top: 8px; font-weight: 700;">PROCHAIN REPAS: 10:00</div>
        </div>

        <div class="phases">
            <div id="p1" class="ph"><i>🧪</i><span>SUCRE</span></div>
            <div id="p2" class="ph"><i>📉</i><span>INSULINE</span></div>
            <div id="p3" class="ph"><i>🔥</i><span>KÉTOSE</span></div>
            <div id="p4" class="ph"><i>✨</i><span>AUTO-P</span></div>
        </div>

        <button onclick="toggleDrawer()" style="width: 100%; padding: 16px; border-radius: 20px; border: none; background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px rgba(46,204,113,0.3);">OUVRIR COACH IA & STATS</button>
    </div>

    <div class="drawer" id="drawer">
        <div class="handle" onclick="toggleDrawer()"></div>
        <div class="tabs">
            <div class="tab active" onclick="setTab(1)">COACH IA</div>
            <div class="tab" onclick="setTab(2)">PROGRÈS</div>
            <div class="tab" onclick="setTab(3)">POIDS</div>
        </div>

        <div class="section active" id="sec1">
            <div id="chat-box" class="chat-view"><div class="msg bot">Prêt Hicham. Pose-moi une question sur ton jeûne !</div></div>
            <div id="ai-loading" class="typing">Connexion Mistral v0.3...</div>
            <div class="chat-input">
                <input type="text" id="ai-input" placeholder="Ta question...">
                <button class="btn-send" onclick="askAI()">🚀</button>
            </div>
            <button onclick="resetKey()" style="background:none; border:none; color:#334155; font-size:0.6rem; margin-top:10px; cursor:pointer; width:100%;">Réinitialiser mon Token IA</button>
        </div>

        <div class="section" id="sec2"><canvas id="wChart"></canvas></div>
        <div class="section" id="sec3">
            <h4 style="margin:0 0 10px">Enregistrer ton poids (kg)</h4>
            <div class="chat-input">
                <input type="number" id="w-input" step="0.1" placeholder="82.5"><button class="btn-send" onclick="saveW()" style="width:auto; padding:0 20px; color:black; font-weight:bold;">OK</button>
            </div>
        </div>
    </div>

<script>
let HF_TOKEN = localStorage.getItem('hf_token_hicham');
const MODEL = "mistralai/Mistral-7B-Instruct-v0.3"; // Utilisation de la v0.3 (plus stable)

function update() {
    const n = new Date(); const h = n.getHours(); const tot = h*3600 + n.getMinutes()*60 + n.getSeconds();
    document.getElementById('clock').innerText = n.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    let isF = true; let rem = 0; let fH = 0;
    if(h >= 10 && h < 16) { isF = false; rem = (16*3600) - tot; setUI("REPAS 🍽️", "var(--orange)", "Fin: 16:00"); }
    else { isF = true; rem = h >= 16 ? (86400 - tot + 36000) : (36000 - tot); setUI("JEÛNE 🔥", "var(--green)", "Prochain: 10:00"); fH = h >= 16 ? h - 16 : h + 8; }
    const hr = Math.floor(rem/3600); const mn = Math.floor((rem%3600)/60); const sc = rem%60;
    document.getElementById('countdown').innerText = `${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
    document.querySelectorAll('.ph').forEach(p=>p.classList.remove('active'));
    if(isF) { if(fH<4) document.getElementById('p1').classList.add('active'); else if(fH<12) document.getElementById('p2').classList.add('active'); else if(fH<16) document.getElementById('p3').classList.add('active'); else document.getElementById('p4').classList.add('active'); }
}
function setUI(t,c,tar){ const s=document.getElementById('status-label'); s.innerText=t; s.style.color=c; document.getElementById('countdown').style.color=c; document.getElementById('target-ui').innerText=tar; }

async function askAI() {
    if(!HF_TOKEN) {
        let key = prompt("Hicham, entre ton token HF (hf_...) :");
        if(key && key.includes('hf_')) { HF_TOKEN = key.trim(); localStorage.setItem('hf_token_hicham', HF_TOKEN); } else return;
    }
    const inp = document.getElementById('ai-input'); const msg = inp.value.trim(); if(!msg) return;
    addMsg(msg, 'user'); inp.value = ""; document.getElementById('ai-loading').style.display='block';

    try {
        const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL}`, {
            method: "POST",
            headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
            body: JSON.stringify({ inputs: `<s>[INST] Réponds brièvement à Hicham en français sur son jeûne 18/6. Question: ${msg} [/INST]`, parameters: {max_new_tokens: 150} })
        });

        const data = await response.json();
        if (response.status === 200 && data[0]) {
            let res = data[0].generated_text.split('[/INST]')[1] || data[0].generated_text;
            addMsg(res.trim(), 'bot');
        } else if (response.status === 503) {
            addMsg("Mistral se réveille... attends 20 sec et réessaie.", 'bot');
        } else {
            addMsg(`Erreur ${response.status}: ${data.error || 'Vérifie ta clé.'}`, 'bot');
        }
    } catch (e) {
        addMsg("Erreur réseau. Si tu as un bloqueur de pub, désactive-le pour ce site.", 'bot');
        console.error(e);
    } finally { document.getElementById('ai-loading').style.display='none'; }
}

function addMsg(t,c){ const b=document.getElementById('chat-box'); const d=document.createElement('div'); d.className=`msg ${c}`; d.innerText=t; b.appendChild(d); b.scrollTop=b.scrollHeight; }
function resetKey(){ localStorage.removeItem('hf_token_hicham'); HF_TOKEN=null; alert("Token supprimé."); }
function toggleDrawer(){ document.getElementById('drawer').classList.toggle('open'); }
function setTab(n){ document.querySelectorAll('.tab,.section').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.tab')[n-1].classList.add('active'); document.getElementById('sec'+n).classList.add('active'); if(n==2) loadChart(); }
let weights = JSON.parse(localStorage.getItem('h_w')||'[]');
function saveW(){ const v=document.getElementById('w-input').value; if(!v) return; weights.push({d:new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}),v:parseFloat(v)}); localStorage.setItem('h_w',JSON.stringify(weights)); document.getElementById('w-input').value=""; alert("Enregistré !"); }
let chart=null;
function loadChart(){ const ctx=document.getElementById('wChart').getContext('2d'); if(chart)chart.destroy(); chart=new Chart(ctx,{type:'line',data:{labels:weights.slice(-7).map(x=>x.d),datasets:[{label:'kg',data:weights.slice(-7).map(x=>x.v),borderColor:'#2ecc71',tension:0.4,fill:true,backgroundColor:'rgba(46,204,113,0.1)'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}}); }
setInterval(update, 1000); update();
</script>
</body>
</html>
