<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hicham Ultimate V3 - Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71; --accent: #f39c12; --bg: #09101d;
            --card: #1a2235; --sleep: #6366f1; --text: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text); 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }

        /* HEADER */
        .header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(9, 16, 29, 0.98); border-bottom: 1px solid rgba(255,255,255,0.05); 
            z-index: 100;
        }
        .profile { display: flex; align-items: center; gap: 10px; }
        .profile img { width: 40px; height: 40px; border-radius: 12px; border: 2px solid var(--primary); object-fit: cover; }

        /* VUES SCROLLABLES */
        .app-view { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: none; flex-direction: column; gap: 20px; 
            padding-bottom: 120px; /* Espace vital pour les boutons du bas */
        }
        .app-view.active { display: flex; }

        /* CARTE TIMER & BOUTON STOP */
        .timer-card { 
            background: var(--card); padding: 25px; border-radius: 40px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05); 
        }
        .ring-container { 
            position: relative; width: 220px; height: 220px; margin: 0 auto; 
            display: flex; align-items: center; justify-content: center; 
        }
        .ring-container svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; pointer-events: none; }
        .ring-fill { fill: none; stroke: var(--primary); stroke-width: 12; stroke-linecap: round; stroke-dasharray: 628; stroke-dashoffset: 628; transition: 1s; }
        
        .timer-ui { z-index: 10; position: relative; } /* S'assure que le bouton est cliquable */
        #countdown { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
        .btn-stop { 
            background: #e74c3c; color: white; border: none; padding: 12px 25px; 
            border-radius: 15px; font-weight: 800; cursor: pointer; position: relative; z-index: 20;
        }

        /* SOMMEIL */
        .sleep-card { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 20px; border-radius: 30px; }
        .sleep-row { display: flex; justify-content: space-between; align-items: center; }
        .btn-sleep { background: white; color: var(--sleep); border: none; padding: 12px 20px; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .btn-link { background: none; border: none; color: white; font-size: 0.75rem; text-decoration: underline; margin-top: 10px; opacity: 0.8; cursor: pointer; }

        /* HISTORIQUE */
        .log-item { background: var(--card); padding: 15px; border-radius: 20px; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .log-item.sleep { border-left-color: var(--sleep); }

        /* NAV BAR FIXE */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; background: #0b121f; 
            display: flex; justify-content: space-around; padding: 15px 0 35px; 
            border-top: 1px solid #222; z-index: 500;
        }
        .nav-item { font-size: 1.5rem; opacity: 0.3; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        /* DRAWERS */
        .drawer { 
            position: fixed; bottom: 0; width: 100%; background: #0f172a; 
            border-radius: 35px 35px 0 0; transform: translateY(100%); 
            transition: 0.4s ease; z-index: 1000; padding: 30px; 
        }
        .drawer.open { transform: translateY(0); }
        .handle { width: 50px; height: 5px; background: #334155; border-radius: 10px; margin: -15px auto 25px; }

        input { width: 100%; background: #1e293b; border: 1px solid #334155; padding: 15px; color: white; border-radius: 15px; margin-bottom: 10px; font-size: 1rem; }
        .btn-full { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; }
        .bg-green { background: var(--primary); color: white; }
        .bg-dark { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile">
            <img src="votre-photo.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Hicham&background=2ecc71&color=fff'">
            <span style="font-weight: 800;">Hicham Master</span>
        </div>
        <div id="clock" style="font-weight: 700; opacity: 0.5;">00:00</div>
    </div>

    <!-- VUE PRINCIPALE -->
    <div class="app-view active" id="view-main">
        <div class="timer-card">
            <span id="fast-status" style="font-size:0.75rem; font-weight:800; color:var(--primary);">JEÛNE EN COURS 🔥</span>
            <div class="ring-container">
                <svg><circle cx="110" cy="110" r="100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="12"></circle>
                <circle id="ring-fill" class="ring-fill" cx="110" cy="110" r="100"></circle></svg>
                <div class="timer-ui">
                    <div id="countdown">00:00:00</div>
                    <button class="btn-stop" onclick="stopFasting()">STOP JEÛNE</button>
                </div>
            </div>
            <p id="phase-txt" style="margin-top:15px; font-size:0.8rem; color:#94a3b8; font-weight:700;"></p>
        </div>

        <div class="sleep-card">
            <div class="sleep-row">
                <div>
                    <h4 style="margin:0;">Sommeil</h4>
                    <p id="sleep-status" style="margin:0; font-size:0.75rem; opacity:0.8;">Inactif</p>
                </div>
                <button class="btn-sleep" onclick="toggleSleep()" id="sleep-btn">🛌 COUCHER</button>
            </div>
            <button class="btn-link" onclick="openDrawer('sleep')">Saisie manuelle (oubli)</button>
        </div>

        <h3 style="margin:0; font-size:1rem;">Aujourd'hui</h3>
        <div id="recent-logs"></div>
    </div>

    <!-- VUE HISTORIQUE -->
    <div class="app-view" id="view-history">
        <h2 style="margin-bottom:20px;">Journal de bord</h2>
        <div id="full-logs"></div>
        <button class="btn-full bg-dark" onclick="exportData()">💾 EXPORTER JOURNAL (.JSON)</button>
    </div>

    <!-- VUE STATS -->
    <div class="app-view" id="view-stats">
        <h3>Graphique Poids</h3>
        <canvas id="weightChart"></canvas>
        <button class="btn-full bg-green" style="margin-top:20px" onclick="openDrawer('poids')">⚖️ NOTER POIDS</button>
    </div>

    <!-- NAVIGATION BAR -->
    <div class="nav-bar">
        <div class="nav-item active" id="nav-main" onclick="switchTab('main')">🏠</div>
        <div class="nav-item" id="nav-stats" onclick="switchTab('stats')">📈</div>
        <div class="nav-item" id="nav-history" onclick="switchTab('history')">📜</div>
    </div>

    <!-- DRAWERS -->
    <div class="drawer" id="drawer-poids">
        <div class="handle" onclick="closeDrawers()"></div>
        <h3>Pesée du jour</h3>
        <input type="number" id="w-input" step="0.1" placeholder="85.0 kg">
        <button class="btn-full bg-green" onclick="saveWeight()">OK</button>
    </div>

    <div class="drawer" id="drawer-sleep">
        <div class="handle" onclick="closeDrawers()"></div>
        <h3>Oubli Sommeil</h3>
        <label style="font-size:0.7rem; color:#64748b;">Début :</label>
        <input type="datetime-local" id="sleep-in">
        <label style="font-size:0.7rem; color:#64748b;">Réveil :</label>
        <input type="datetime-local" id="sleep-out">
        <button class="btn-full bg-green" onclick="saveManualSleep()" style="background:var(--sleep)">VALIDER</button>
    </div>

<script>
/* ================= DONNÉES UNIFIÉES ================= */
const KEY_LOGS = 'HICHAM_V3_LOGS';
const KEY_WEIGHTS = 'HICHAM_V3_WEIGHTS';
const KEY_SLEEP_START = 'HICHAM_V3_SLEEP_START';

let logs = JSON.parse(localStorage.getItem(KEY_LOGS) || '[]');
let weights = JSON.parse(localStorage.getItem(KEY_WEIGHTS) || '[]');

function update() {
    const now = new Date();
    const h = now.getHours(); const totS = h*3600 + now.getMinutes()*60 + now.getSeconds();
    document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});

    // Fasting Logic 18/6
    let isF = (h < 10 || h >= 16);
    let rem = isF ? (h >= 16 ? (86400 - totS + 36000) : (36000 - totS)) : (57600 - totS);
    let totWin = isF ? 18*3600 : 6*3600;

    document.getElementById('countdown').innerText = formatTime(rem);
    document.getElementById('fast-status').innerText = isF ? "JEÛNE EN COURS 🔥" : "FENÊTRE REPAS 🍽️";
    document.getElementById('fast-status').style.color = isF ? "var(--primary)" : "var(--accent)";
    document.getElementById('ring-fill').style.stroke = isF ? "var(--primary)" : "var(--accent)";
    document.getElementById('ring-fill').style.strokeDashoffset = 628 - (rem / totWin) * 628;

    // Phase Logic
    let fH = isF ? (h >= 16 ? h - 16 : h + 8) : -1;
    let pTxt = "Repas";
    if(fH >= 16) pTxt = "Autophagie"; else if(fH >= 12) pTxt = "Cétose"; else if(fH >= 4) pTxt = "Chute d'insuline";
    document.getElementById('phase-txt').innerText = "Phase : " + pTxt;

    updateSleepStatus();
}

function formatTime(s) {
    const hr = Math.floor(s/3600); const mn = Math.floor((s%3600)/60); const sc = s%60;
    return `${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

/* ================= ACTIONS ================= */
function stopFasting() {
    if(!confirm("Hicham, confirmer la fin du jeûne ?")) return;
    addLog('JEÛNE', 'Validé à ' + new Date().toLocaleTimeString(), 'primary');
}

function toggleSleep() {
    const start = localStorage.getItem(KEY_SLEEP_START);
    if(!start) {
        localStorage.setItem(KEY_SLEEP_START, new Date().getTime());
    } else {
        const end = new Date().getTime();
        const dur = ((end - parseInt(start)) / 3600000).toFixed(1);
        addLog('SOMMEIL', `Nuit : ${dur}h (Auto)`, 'sleep');
        localStorage.removeItem(KEY_SLEEP_START);
    }
    updateSleepStatus();
}

function updateSleepStatus() {
    const s = localStorage.getItem(KEY_SLEEP_START);
    document.getElementById('sleep-status').innerText = s ? "En cours..." : "Inactif";
    document.getElementById('sleep-btn').innerText = s ? "☀️ RÉVEIL" : "🛌 COUCHER";
}

function saveManualSleep() {
    const i = document.getElementById('sleep-in').value;
    const o = document.getElementById('sleep-out').value;
    if(!i || !o) return;
    const dur = ((new Date(o) - new Date(i)) / 3600000).toFixed(1);
    addLog('SOMMEIL', `Nuit : ${dur}h (Manuel)`, 'sleep');
    closeDrawers();
}

function addLog(type, desc, color) {
    logs.unshift({ type, desc, color, date: new Date().toLocaleDateString('fr-FR') });
    localStorage.setItem(KEY_LOGS, JSON.stringify(logs.slice(0, 50)));
    renderLogs();
}

function renderLogs() {
    const html = logs.map(l => `<div class="log-item ${l.color === 'sleep' ? 'sleep' : ''}"><div><b>${l.type}</b><br><small>${l.desc}</small></div><small>${l.date}</small></div>`).join('');
    document.getElementById('recent-logs').innerHTML = html.slice(0, 400); // Limite visuelle
    document.getElementById('full-logs').innerHTML = html;
}

/* ================= NAVIGATION & DRAWER ================= */
function switchTab(t) {
    document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-'+t).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('nav-'+t).classList.add('active');
    if(t === 'stats') renderChart();
}

function openDrawer(id) { document.getElementById('drawer-'+id).classList.add('open'); }
function closeDrawers() { document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open')); }

function saveWeight() {
    const v = document.getElementById('w-input').value; if(!v) return;
    weights.push({d: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'short'}), v: parseFloat(v)});
    localStorage.setItem(KEY_WEIGHTS, JSON.stringify(weights));
    addLog('POIDS', `${v}kg enregistré`, 'primary');
    closeDrawers();
}

function
