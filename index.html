<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hicham Master - Fasting Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #F7F3EF;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255, 255, 255, 0.9);
            --accent-primary: #D4A574;
            --accent-secondary: #8B7355;
            --accent-success: #6B8E6B;
            --accent-sleep: #7B8CDE;
            --text-primary: #2D2A26;
            --text-secondary: #8B8680;
            --shadow-soft: 0 4px 20px rgba(139, 115, 85, 0.08);
            --btn-height: 60px; /* Standard Grey Corner */
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        
        body { 
            margin: 0; background: var(--bg-primary); color: var(--text-primary); 
            height: 100vh; height: 100dvh; overflow: hidden; position: fixed; width: 100%;
        }

        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }

        /* Header */
        .header { 
            padding: 16px 20px; padding-top: max(16px, env(safe-area-inset-top));
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--bg-secondary); border-bottom: 1px solid rgba(139, 115, 85, 0.08);
        }
        .profile img { width: 40px; height: 40px; border-radius: 12px; border: 2px solid var(--accent-primary); }

        /* Contenu Scrollable */
        .app-view { 
            flex: 1; overflow-y: auto; padding: 16px 20px 100px; 
            display: none; flex-direction: column; gap: 16px; 
        }
        .app-view.active { display: flex; }

        /* Timer Card */
        .timer-card { 
            background: var(--bg-card); padding: 24px; border-radius: 32px; 
            text-align: center; box-shadow: var(--shadow-soft); border: 1px solid rgba(139, 115, 85, 0.05);
        }

        .ring-container { 
            position: relative; width: 220px; height: 220px; margin: 0 auto 20px; 
            display: flex; align-items: center; justify-content: center; 
        }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .ring-bg { fill: none; stroke: rgba(139, 115, 85, 0.1); stroke-width: 10; }
        .ring-fill { 
            fill: none; stroke: var(--accent-primary); stroke-width: 10; 
            stroke-linecap: round; stroke-dasharray: 565; stroke-dashoffset: 565; 
            transition: stroke-dashoffset 0.5s ease, stroke 0.5s ease; 
        }

        #countdown { font-size: 2.5rem; font-weight: 800; margin-bottom: 4px; letter-spacing: -1px; }
        .timer-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 20px; }

        /* Boutons Standard 60px */
        .btn-primary {
            height: var(--btn-height); width: 100%; max-width: 280px;
            border-radius: 20px; border: none; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.2s; color: white;
            background: linear-gradient(135deg, var(--accent-success), #8FBC8F);
            box-shadow: 0 8px 15px rgba(107, 142, 107, 0.2);
        }
        .btn-primary:active { transform: scale(0.96); }
        .btn-stop { background: linear-gradient(135deg, #E07A5F, var(--accent-primary)); }

        /* Info de début éditable */
        .fast-start-info {
            background: rgba(212, 165, 116, 0.1); padding: 10px 16px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            font-size: 0.85rem; margin-bottom: 15px;
        }
        .edit-btn { background: none; border: none; color: var(--accent-secondary); cursor: pointer; font-size: 1.1rem; }

        /* Phase Card Detail */
        .phase-detail-card {
            background: var(--bg-secondary); padding: 16px; border-radius: 20px;
            text-align: left; border: 1px solid rgba(139, 115, 85, 0.1); margin-top: 10px;
        }
        .phase-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .phase-badge { font-size: 1.5rem; }
        .phase-title { font-weight: 700; font-size: 1rem; color: var(--accent-secondary); }
        .phase-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.4; }

        /* Navigation */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95);
            display: flex; justify-content: space-around; padding: 12px 0 env(safe-area-inset-bottom);
            border-top: 1px solid rgba(139,115,85,0.1); backdrop-filter: blur(10px);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-secondary); font-size: 0.7rem; gap: 4px; }
        .nav-item.active { color: var(--accent-primary); font-weight: 700; }

        /* Phases Colors */
        .phase-1 { stroke: #E6A75C; } /* Digestion */
        .phase-2 { stroke: #D4A574; } /* Transition */
        .phase-3 { stroke: #6B8E6B; } /* Cétose */
        .phase-4 { stroke: #7B8CDE; } /* Autophagie */
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size:1.2rem;">Bonjour Hicham</h1>
            <span style="font-size:0.8rem; color:var(--text-secondary);" id="date-display">--</span>
        </div>
        <div class="profile">
            <img src="https://ui-avatars.com/api/?name=Hicham&background=D4A574&color=fff" alt="Profile">
        </div>
    </div>

    <div class="app-view active" id="view-main">
        <div class="timer-card">
            <div class="fast-start-info" id="fast-info-box" style="display:none;">
                <span>Démarré : <b id="start-time-text">--:--</b></span>
                <button class="edit-btn" onclick="editStartTime()">✏️</button>
            </div>

            <div class="ring-container">
                <svg viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="90" class="ring-bg"></circle>
                    <circle id="ring-fill" class="ring-fill" cx="100" cy="100" r="90"></circle>
                </svg>
                <div style="position:absolute;">
                    <div id="countdown">00:00:00</div>
                    <div class="timer-label" id="timer-label">Fenêtre de repas</div>
                    <button id="main-action-btn" class="btn-primary" onclick="handleAction()">Démarrer</button>
                </div>
            </div>

            <div class="phase-detail-card" id="phase-card">
                <div class="phase-header">
                    <span id="p-icon" class="phase-badge">🍽️</span>
                    <span id="p-title" class="phase-title">Alimentation</span>
                </div>
                <p id="p-desc" class="phase-desc">Le corps stocke l'énergie des repas.</p>
            </div>
        </div>

        <div style="background:white; padding:16px; border-radius:20px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h4 style="margin:0;">Mode</h4>
                <p style="margin:0; font-size:0.8rem; color:var(--text-secondary);">Actuellement en manuel</p>
            </div>
            <button onclick="toggleMode()" style="background:var(--bg-primary); border:none; padding:8px 16px; border-radius:10px; font-weight:600;">Switch</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active">🏠<span>Accueil</span></div>
        <div class="nav-item">📈<span>Stats</span></div>
        <div class="nav-item">📜<span>Historique</span></div>
    </div>
</div>

<script>
    // Config & État
    const KEY_START = 'FAST_START_v3';
    const KEY_SETTINGS = 'FAST_SETTINGS_v3';
    let settings = { duration: 16 };
    let timerInterval;

    const PHASES = [
        { title: "Alimentation", icon: "🍽️", desc: "Le corps utilise le glucose. L'insuline est élevée.", class: "phase-0" },
        { title: "Post-Absorption", icon: "📉", desc: "4h - 12h : Le taux de sucre baisse, l'insuline redescend.", class: "phase-1" },
        { title: "Néoglucogenèse", icon: "⚡", desc: "12h - 16h : Le foie commence à libérer du glucose stocké.", class: "phase-2" },
        { title: "Cétose", icon: "🔥", desc: "16h - 24h : Le corps brûle les graisses pour l'énergie.", class: "phase-3" },
        { title: "Autophagie", icon: "🧬", desc: "24h+ : Régénération cellulaire et nettoyage profond.", class: "phase-4" }
    ];

    function init() {
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
        update();
        timerInterval = setInterval(update, 1000);
    }

    function update() {
        const start = localStorage.getItem(KEY_START);
        const actionBtn = document.getElementById('main-action-btn');
        const infoBox = document.getElementById('fast-info-box');
        const ring = document.getElementById('ring-fill');
        const circum = 2 * Math.PI * 90;

        if (start) {
            const startTime = parseInt(start);
            const now = Date.now();
            const elapsed = (now - startTime) / 1000;
            const remaining = Math.max(0, (settings.duration * 3600) - elapsed);
            const progress = Math.min(1, elapsed / (settings.duration * 3600));

            // UI Jeûne
            document.getElementById('countdown').innerText = formatTime(remaining);
            document.getElementById('timer-label').innerText = "Temps restant";
            actionBtn.innerText = "Arrêter";
            actionBtn.classList.add('btn-stop');
            infoBox.style.display = 'flex';
            document.getElementById('start-time-text').innerText = new Date(startTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // Cercle
            ring.style.strokeDashoffset = circum - (progress * circum);

            // Phase Logic
            const hours = elapsed / 3600;
            let pIdx = 0;
            if (hours >= 4 && hours < 12) pIdx = 1;
            else if (hours >= 12 && hours < 16) pIdx = 2;
            else if (hours >= 16 && hours < 24) pIdx = 3;
            else if (hours >= 24) pIdx = 4;
            
            updatePhaseUI(pIdx, ring);
        } else {
            // UI Repas
            document.getElementById('countdown').innerText = "00:00:00";
            document.getElementById('timer-label').innerText = "Prêt à jeûner ?";
            actionBtn.innerText = "Démarrer";
            actionBtn.classList.remove('btn-stop');
            infoBox.style.display = 'none';
            ring.style.strokeDashoffset = circum;
            updatePhaseUI(0, ring);
        }
    }

    function updatePhaseUI(idx, ring) {
        const p = PHASES[idx];
        document.getElementById('p-icon').innerText = p.icon;
        document.getElementById('p-title').innerText = p.title;
        document.getElementById('p-desc').innerText = p.desc;
        ring.className = `ring-fill phase-${idx}`;
    }

    function handleAction() {
        if (localStorage.getItem(KEY_START)) {
            if(confirm("Arrêter le jeûne maintenant ?")) {
                localStorage.removeItem(KEY_START);
            }
        } else {
            localStorage.setItem(KEY_START, Date.now());
        }
        update();
    }

    function editStartTime() {
        const current = localStorage.getItem(KEY_START);
        if (!current) return;
        
        const date = new Date(parseInt(current));
        const hours = prompt("Heure de début (HH) ?", date.getHours());
        const mins = prompt("Minutes de début (MM) ?", date.getMinutes());
        
        if (hours !== null && mins !== null) {
            const newDate = new Date();
            newDate.setHours(hours, mins, 0);
            // Si l'heure est dans le futur, on assume que c'était hier
            if (newDate > Date.now()) newDate.setDate(newDate.getDate() - 1);
            
            localStorage.setItem(KEY_START, newDate.getTime());
            update();
        }
    }

    function formatTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = Math.floor(s % 60);
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function toggleMode() { alert("Le mode automatique sera disponible dans la prochaine mise à jour Dropbox."); }

    init();
</script>

</body>
</html>
