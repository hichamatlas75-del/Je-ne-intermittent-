<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hicham Fasting Master</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --green: #2ecc71; --orange: #f39c12; --dark: #090e1a; --card: #161c2d; --text: #ffffff; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(9,14,26,0.95); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .profile { display: flex; align-items: center; gap: 12px; }
        .profile img { width: 42px; height: 42px; border-radius: 12px; border: 2px solid var(--green); object-fit: cover; }
        .clock-ui { font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--green); }

        .main { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 20px; padding-bottom: 30px; }
        
        /* TIMER CIRCLE */
        .timer-box { position: relative; width: 250px; height: 250px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--card); box-shadow: 0 20px 50px rgba(0,0,0,0.6); margin-top: 10px; }
        #countdown { font-size: 3.2rem; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .status-badge { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }

        /* INTERACTIVE PHASES */
        .phases-title { align-self: flex-start; font-size: 0.9rem; font-weight: 800; color: #94a3b8; margin-bottom: -10px; }
        .phases-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        .ph-btn { background: var(--card); padding: 15px 5px; border-radius: 18px; text-align: center; opacity: 0.4; transition: 0.3s; border: 2px solid transparent; cursor: pointer; }
        .ph-btn.active { opacity: 1; border-color: var(--green); background: rgba(46, 204, 113, 0.1); }
        .ph-btn i { font-size: 1.3rem; display: block; margin-bottom: 4px; }
        .ph-btn span { font-size: 0.55rem; font-weight: 800; color: #64748b; }

        /* INFO CARD */
        .info-card { background: var(--card); padding: 20px; border-radius: 25px; border-left: 5px solid var(--green); width: 100%; min-height: 120px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #info-title { margin: 0; color: var(--green); font-size: 1rem; font-weight: 800; }
        #info-desc { font-size: 0.85rem; color: #94a3b8; margin: 8px 0 0; line-height: 1.5; }

        /* DRAWER BOTTOM */
        .drawer { position: fixed; bottom: 0; width: 100%; background: #0f172a; border-radius: 30px 30px 0 0; height: 75vh; transform: translateY(calc(100% - 65px)); transition: transform 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 1000; border-top: 1px solid rgba(255,255,255,0.1); }
        .drawer.open { transform: translateY(0); }
        .handle { width: 45px; height: 5px; background: #334155; border-radius: 10px; margin: 12px auto; cursor: pointer; }

        .tabs { display: flex; justify-content: space-around; padding: 5px; }
        .tab { font-size: 0.8rem; font-weight: 800; opacity: 0.4; color: white; cursor: pointer; padding: 10px; }
        .tab.active { opacity: 1; color: var(--green); border-bottom: 3px solid var(--green); }

        .section { display: none; padding: 20px; flex-direction: column; }
        .section.active { display: flex; }

        .input-group { display: flex; gap: 8px; margin-top: 15px; }
        .input-group input { flex: 1; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; color: white; }
        .btn-action { background: var(--green); border: none; padding: 15px 25px; border-radius: 15px; font-weight: 800; cursor: pointer; }

        canvas { width: 100% !important; max-height: 250px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile">
            <img src="votre-photo.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Hicham&background=2ecc71&color=fff'">
            <div>
                <div style="font-weight: 800; font-size: 1.1rem;">HICHAM</div>
                <div style="font-size: 0.65rem; color: var(--green); font-weight: 800;">PROGRAMME 18/6</div>
            </div>
        </div>
        <div id="clock" class="clock-ui">00:00</div>
    </div>

    <div class="main">
        <div class="timer-box">
            <div id="status-label" class="status-badge">Analyse...</div>
            <h1 id="countdown">00:00:00</h1>
            <div id="target-ui" style="font-size: 0.7rem; color: #64748b; margin-top: 8px; font-weight: 700;">FENÊTRE : 10h - 16h</div>
        </div>

        <div class="phases-title">ÉTAPE DU MÉTABOLISME :</div>
        <div class="phases-row">
            <div id="p1" class="ph-btn" onclick="showPhase(1)"><i>🧪</i><span>SUCRE</span></div>
            <div id="p2" class="ph-btn" onclick="showPhase(2)"><i>📉</i><span>INSULINE</span></div>
            <div id="p3" class="ph-btn" onclick="showPhase(3)"><i>🔥</i><span>KÉTOSE</span></div>
            <div id="p4" class="ph-btn" onclick="showPhase(4)"><i>✨</i><span>AUTO-P</span></div>
        </div>

        <div class="info-card" id="info-card">
            <h4 id="info-title">Cliquez sur une phase</h4>
            <p id="info-desc">Découvrez ce qui se passe dans votre corps en temps réel.</p>
        </div>

        <button onclick="toggleDrawer()" style="width: 100%; padding: 18px; border-radius: 20px; border: none; background: #1e293b; color: white; font-weight: 800; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);">⚖️ MON SUIVI POIDS</button>
    </div>

    <div class="drawer" id="drawer">
        <div class="handle" onclick="toggleDrawer()"></div>
        <div class="tabs">
            <div class="tab active" onclick="setTab(1)">POIDS</div>
            <div class="tab" onclick="setTab(2)">PROGRÈS</div>
        </div>

        <div class="section active" id="sec1">
            <h4 style="margin:0">Enregistrer ton poids (kg)</h4>
            <div class="input-group">
                <input type="number" id="w-input" step="0.1" placeholder="Ex: 82.5">
                <button class="btn-action" onclick="saveW()">OK</button>
            </div>
        </div>

        <div class="section" id="sec2">
            <h4 style="margin:0">Évolution sur 7 jours</h4>
            <canvas id="wChart"></canvas>
        </div>
    </div>

<script>
/* ================= LOGIQUE CORE ================= */
const START_E = 10; const END_E = 16;

const phaseData = {
    1: { t: "Phase 1 : Glycémie (0-4h)", d: "Hicham, ton corps termine de traiter le sucre de ton dernier repas. L'insuline est encore présente pour stocker l'énergie." },
    2: { t: "Phase 2 : Chute d'Insuline (4-12h)", d: "Le taux d'insuline baisse radicalement. Ton corps commence à puiser dans le glycogène (sucre stocké dans le foie)." },
    3: { t: "Phase 3 : Cétose Active (12-16h)", d: "Brûlage intensif ! Tes graisses sont transformées en cétones. Tu gagnes en énergie et en clarté mentale." },
    4: { t: "Phase 4 : Autophagie (16h+)", d: "Hicham, c'est l'étape royale. Tes cellules s'auto-nettoient et se régénèrent. C'est le secret de la longévité." }
};

function update() {
    const n = new Date();
    const h = n.getHours(); const m = n.getMinutes(); const s = n.getSeconds();
    const totS = h*3600 + m*60 + s;
    document.getElementById('clock').innerText = n.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});

    let isFasting = true; let rem = 0; let fastH = 0;

    if(h >= START_E && h < END_E) {
        isFasting = false; rem = (END_E*3600) - totS;
        setUI("FENÊTRE REPAS 🍽️", "var(--orange)");
    } else {
        isFasting = true; rem = h >= END_E ? (86400 - totS + START_E*3600) : (START_E*3600 - totS);
        setUI("JEÛNE ACTIF 🔥", "var(--green)");
        // Calcul automatique de la phase actuelle
        fastH = h >= 16 ? h - 16 : h + 8;
        autoSelectPhase(fastH);
    }

    const hr = Math.floor(rem/3600); const mn = Math.floor((rem%3600)/60); const sc = rem%60;
    document.getElementById('countdown').innerText = `${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

function setUI(t, c) {
    const s = document.getElementById('status-label');
    s.innerText = t; s.style.color = c;
    document.getElementById('countdown').style.color = c;
    document.getElementById('info-card').style.borderColor = c;
}

function autoSelectPhase(h) {
    let p = 1;
    if(h >= 16) p = 4;
    else if(h >= 12) p = 3;
    else if(h >= 4) p = 2;
    showPhase(p, true); // true = mode auto (ne pas forcer si l'utilisateur a cliqué ailleurs)
}

let manualClick = false;
function showPhase(id, auto = false) {
    if(auto && manualClick) return; // Si l'utilisateur a cliqué, on ne change pas automatiquement
    if(!auto) manualClick = true;

    document.querySelectorAll('.ph-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('p'+id).classList.add('active');
    
    document.getElementById('info-title').innerText = phaseData[id].t;
    document.getElementById('info-desc').innerText = phaseData[id].d;
}

/* ================= UTILS ================= */
function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); }
function setTab(n) {
    document.querySelectorAll('.tab, .section').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab')[n-1].classList.add('active');
    document.getElementById('sec'+n).classList.add('active');
    if(n==2) loadChart();
}

let weights = JSON.parse(localStorage.getItem('h_w') || '[]');
function saveW() {
    const v = document.getElementById('w-input').value; if(!v) return;
    weights.push({d: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'short'}), v: parseFloat(v)});
    localStorage.setItem('h_w', JSON.stringify(weights));
    document.getElementById('w-input').value = ""; alert("Poids enregistré !");
}

let chart = null;
function loadChart() {
    const ctx = document.getElementById('wChart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'line',
        data: { labels: weights.slice(-7).map(x=>x.d), datasets: [{label:'kg', data:weights.slice(-7).map(x=>x.v), borderColor:'#2ecc71', tension:0.4, fill:true, backgroundColor:'rgba(46,204,113,0.1)'}]},
        options: { responsive:true, maintainAspectRatio:false, plugins: { legend: { display: false } } }
    });
}

setInterval(update, 1000); update();
</script>
</body>
</html>
