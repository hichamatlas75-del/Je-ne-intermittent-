<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hicham Ultimate Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71; --accent: #f39c12; --bg: #09101d;
            --card: #1a2235; --sleep: #6366f1; --text: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(9, 16, 29, 0.95); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .profile { display: flex; align-items: center; gap: 10px; }
        .profile img { width: 40px; height: 40px; border-radius: 12px; border: 2px solid var(--primary); object-fit: cover; }

        /* SCROLL CONTAINER */
        .app-main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 120px; }

        /* TIMER CARD + BUTTON STOP */
        .timer-card { background: var(--card); padding: 25px; border-radius: 40px; text-align: center; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .ring-box { position: relative; width: 220px; height: 220px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .ring-box svg { transform: rotate(-90deg); position: absolute; width: 220px; height: 220px; }
        .ring-fill { fill: none; stroke: var(--primary); stroke-width: 12; stroke-linecap: round; stroke-dasharray: 628; stroke-dashoffset: 628; transition: 1s; }
        
        .timer-center { z-index: 10; display: flex; flex-direction: column; align-items: center; }
        #countdown { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
        .btn-stop { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 15px; font-weight: 800; font-size: 0.8rem; cursor: pointer; box-shadow: 0 5px 15px rgba(231,76,60,0.3); }

        /* SLEEP WIDGET */
        .sleep-card { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 20px; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn-sleep { background: white; color: var(--sleep); border: none; padding: 12px 20px; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 0.8rem; }

        /* HISTORY LIST */
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item { background: var(--card); padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); }
        .history-item.sleep { border-left-color: var(--sleep); }
        .history-meta { font-size: 0.75rem; color: #64748b; }

        /* NAV & DRAWERS */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0b121f; display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid #222; }
        .nav-item { font-size: 1.5rem; opacity: 0.3; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        .drawer { position: fixed; bottom: 0; width: 100%; background: #0f172a; border-radius: 35px 35px 0 0; transform: translateY(100%); transition: 0.4s; z-index: 2000; padding: 30px; max-height: 80vh; overflow-y: auto; }
        .drawer.open { transform: translateY(0); }
        .handle { width: 50px; height: 5px; background: #334155; border-radius: 10px; margin: -15px auto 20px; }

        .btn-block { width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .bg-green { background: var(--primary); color: white; }
        .bg-dark { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile">
            <img src="votre-photo.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Hicham&background=2ecc71&color=fff'">
            <span style="font-weight: 800;">Hicham Life Pro</span>
        </div>
        <div id="clock" style="opacity: 0.5; font-size: 0.8rem; font-weight: 700;">00:00</div>
    </div>

    <div class="app-main" id="view-main">
        <!-- FASTING TIMER -->
        <div class="timer-card">
            <span id="fast-label" style="font-size:0.7rem; font-weight:800; color:var(--primary); letter-spacing:1px;">JEÛNE ACTIF</span>
            <div class="ring-box">
                <svg><circle cx="110" cy="110" r="100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="12"></circle>
                <circle id="ring-fill" class="ring-fill" cx="110" cy="110" r="100"></circle></svg>
                <div class="timer-center">
                    <div id="countdown">00:00:00</div>
                    <button class="btn-stop" id="stop-btn" onclick="stopFasting()">STOP JEÛNE</button>
                </div>
            </div>
            <p id="info-phase" style="font-size: 0.8rem; color: #94a3b8; margin-top: 15px;">Phase : Analyse...</p>
        </div>

        <!-- SLEEP WIDGET -->
        <div class="sleep-card">
            <div>
                <h4 style="margin:0;">Sommeil</h4>
                <p id="sleep-status" style="margin:5px 0 0; font-size:0.75rem; opacity:0.8;">Pas de session en cours</p>
            </div>
            <button class="btn-sleep" id="sleep-toggle" onclick="toggleSleep()">🛌 COUCHER</button>
        </div>

        <!-- RECENT HISTORY -->
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0; font-size:1rem;">Historique Récent</h3>
            <span style="font-size:0.7rem; color:var(--primary);" onclick="showTab('history')">Voir tout</span>
        </div>
        <div id="recent-list" class="history-list">
            <!-- Injecté par JS -->
        </div>
    </div>

    <!-- VIEW HISTORY -->
    <div class="app-main" id="view-history" style="display:none;">
        <h2 style="margin-bottom:20px;">Journal Complet</h2>
        <div id="full-list" class="history-list"></div>
        <button class="btn-block bg-dark" onclick="exportMasterData()">💾 EXPORTER LE JOURNAL (.JSON)</button>
    </div>

    <!-- VIEW STATS -->
    <div class="app-main" id="view-stats" style="display:none;">
        <h3>Évolution Poids</h3>
        <canvas id="wChart"></canvas>
        <button class="btn-block bg-green" onclick="toggleDrawer()">⚖️ AJOUTER POIDS</button>
    </div>

    <!-- NAV BAR -->
    <div class="nav-bar">
        <div class="nav-item active" id="nav-main" onclick="showTab('main')">🏠</div>
        <div class="nav-item" id="nav-stats" onclick="showTab('stats')">📊</div>
        <div class="nav-item" id="nav-history" onclick="showTab('history')">📜</div>
    </div>

    <!-- DRAWER POIDS -->
    <div class="drawer" id="drawer">
        <div class="handle" onclick="toggleDrawer()"></div>
        <h3>Ma pesée</h3>
        <input type="number" id="w-input" step="0.1" placeholder="Poids en kg" style="width:100%; background:#1e293b; border:none; padding:20px; color:white; border-radius:15px;">
        <button class="btn-block bg-green" onclick="saveW()">ENREGISTRER</button>
    </div>

<script>
/* ================= SYSTEM DATA ================= */
const DB_LOGS = 'HICHAM_LOGS';
const DB_WEIGHTS = 'HICHAM_WEIGHTS';
const DB_SLEEP_START = 'HICHAM_SLEEP_START';

let logs = JSON.parse(localStorage.getItem(DB_LOGS) || '[]');
let weights = JSON.parse(localStorage.getItem(DB_WEIGHTS) || '[]');

function update() {
    const now = new Date();
    const h = now.getHours(); const totS = h*3600 + now.getMinutes()*60 + now.getSeconds();
    document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});

    // Fasting Logic 18/6
    let isF = (h < 10 || h >= 16);
    let rem = isF ? (h >= 16 ? (86400 - totS + 36000) : (36000 - totS)) : (57600 - totS);
    let totWin = isF ? 18*3600 : 6*3600;

    document.getElementById('countdown').innerText = formatTime(rem);
    document.getElementById('fast-label').innerText = isF ? "JEÛNE ACTIF 🔥" : "FENÊTRE REPAS 🍽️";
    document.getElementById('fast-label').style.color = isF ? "var(--primary)" : "var(--accent)";
    document.getElementById('ring-fill').style.stroke = isF ? "var(--primary)" : "var(--accent)";
    document.getElementById('ring-fill').style.strokeDashoffset = 628 - (rem / totWin) * 628;
    
    // Phase Info
    let fH = isF ? (h >= 16 ? h - 16 : h + 8) : -1;
    let phaseTxt = "Alimentation active";
    if(fH >= 16) phaseTxt = "Autophagie (Régénération)";
    else if(fH >= 12) phaseTxt = "Cétose (Brûlage graisses)";
    else if(fH >= 4) phaseTxt = "Baisse d'insuline";
    else if(fH >= 0) phaseTxt = "Stabilisation sucre";
    document.getElementById('info-phase').innerText = "Phase : " + phaseTxt;

    checkSleepStatus();
}

function formatTime(s) {
    const hr = Math.floor(s/3600); const mn = Math.floor((s%3600)/60); const sc = s%60;
    return `${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

/* ================= ACTIONS JEÛNE ================= */
function stopFasting() {
    if(!confirm("Hicham, as-tu fini ton jeûne et commencé à manger ?")) return;
    const now = new Date();
    // On calcule la durée théorique effectuée (exemple simplifié)
    addLog('JEÛNE', 'Validé à ' + now.toLocaleTimeString(), 'primary');
    alert("Bravo ! Session enregistrée.");
}

/* ================= SOMMEIL ================= */
function toggleSleep() {
    const startTime = localStorage.getItem(DB_SLEEP_START);
    const btn = document.getElementById('sleep-toggle');
    
    if(!startTime) {
        // Commencer sommeil
        localStorage.setItem(DB_SLEEP_START, new Date().getTime());
        alert("Bonne nuit Hicham ! Repose-toi bien.");
    } else {
        // Réveil
        const end = new Date().getTime();
        const durationHr = ((end - parseInt(startTime)) / 3600000).toFixed(1);
        addLog('SOMMEIL', `Durée : ${durationHr} heures`, 'sleep');
        localStorage.removeItem(DB_SLEEP_START);
        alert(`Bonjour ! Tu as dormi ${durationHr}h.`);
    }
    checkSleepStatus();
}

function checkSleepStatus() {
    const startTime = localStorage.getItem(DB_SLEEP_START);
    const status = document.getElementById('sleep-status');
    const btn = document.getElementById('sleep-toggle');
    if(startTime) {
        status.innerText = "Sommeil en cours...";
        btn.innerText = "☀️ RÉVEIL";
    } else {
        status.innerText = "Pas de session en cours";
        btn.innerText = "🛌 COUCHER";
    }
}

/* ================= JOURNAL & EXPORT ================= */
function addLog(type, desc, colorClass) {
    const entry = { type, desc, color: colorClass, date: new Date().toLocaleDateString('fr-FR'), time: new Date().toLocaleTimeString('fr-FR') };
    logs.unshift(entry);
    localStorage.setItem(DB_LOGS, JSON.stringify(logs.slice(0, 50))); // Garde 50 entrées
    renderHistory();
}

function renderHistory() {
    const recent = document.getElementById('recent-list');
    const full = document.getElementById('full-list');
    const html = logs.map(l => `
        <div class="history-item ${l.color === 'sleep' ? 'sleep' : ''}">
            <div>
                <b style="font-size:0.9rem">${l.type}</b><br>
                <span style="font-size:0.8rem; opacity:0.8">${l.desc}</span>
            </div>
            <div class="history-meta">${l.date}</div>
        </div>
    `).join('');
    recent.innerHTML = logs.slice(0, 3).map(l => `
        <div class="history-item ${l.color === 'sleep' ? 'sleep' : ''}" style="padding:10px">
            <span style="font-size:0.8rem"><b>${l.type}:</b> ${l.desc}</span>
        </div>
    `).join('');
    full.innerHTML = html;
}

function exportMasterData() {
    const masterData = { user: "Hicham", logs: logs, weights: weights, exportDate: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(masterData, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Hicham_Health_Backup_${new Date().toLocaleDateString()}.json`;
    a.click();
}

/* ================= UI NAVIGATION ================= */
function showTab(t) {
    document.querySelectorAll('.app-main').forEach(v => v.style.display = 'none');
    document.getElementById('view-'+t).style.display = 'flex';
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('nav-'+t).classList.add('active');
    if(t === 'stats') renderChart();
}

function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); }
function saveW() {
    const v = document.getElementById('w-input').value; if(!v) return;
    weights.push({d: new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}), v: parseFloat(v)});
    localStorage.setItem(DB_WEIGHTS, JSON.stringify(weights));
    addLog('POIDS', `Nouveau poids : ${v}kg`, 'primary');
    toggleDrawer(); alert("Poids enregistré !");
}

let chartObj = null;
function renderChart() {
    const ctx = document.getElementById('wChart').getContext('2d');
    if(chartObj) chartObj.destroy();
    chartObj = new Chart(ctx, {
        type: 'line',
        data: { labels: weights.slice(-7).map(x=>x.d), datasets: [{label:'kg', data:weights.slice(-7).map(x=>x.v), borderColor:'#2ecc71', tension:0.4, fill:true, backgroundColor:'rgba(46,204,113,0.1)'}]},
        options: { responsive:true, maintainAspectRatio:false, plugins: { legend: { display: false } } }
    });
}

setInterval(update, 1000);
update();
renderHistory();
</script>
</body>
</html>
