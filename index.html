<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hicham - Jeûne Pro</title>

    <!-- Chargement sécurisé de Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" onerror="console.log('Erreur chargement Chart.js')"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a !important; /* Couleur forcée pour éviter le blanc */
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* HEADER */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
        }

        .profile-group { display: flex; align-items: center; gap: 10px; }
        .profile-mini { width: 40px; height: 40px; border-radius: 12px; object-fit: cover; border: 2px solid #2ecc71; }

        .clock { font-size: 14px; font-weight: 600; opacity: 0.8; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; }

        /* DASHBOARD */
        .container { padding: 20px; text-align: center; }

        .timer-card {
            background: #1e293b;
            padding: 30px 20px;
            border-radius: 30px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .big-time {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 10px 0;
            color: #2ecc71;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* BOUTON */
        .actions { margin-top: 30px; }
        .btn-main {
            padding: 16px 30px;
            border: none;
            border-radius: 18px;
            background: #2ecc71;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 80%;
        }

        /* DRAWER */
        .drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #161e2e;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            transform: translateY(calc(100% - 70px));
            transition: 0.4s ease-in-out;
            padding: 20px;
            height: 80vh;
            z-index: 100;
        }

        .drawer.open { transform: translateY(0%); }

        .drawer-handle {
            width: 40px; height: 5px; background: rgba(255,255,255,0.2);
            border-radius: 10px; margin: -10px auto 20px;
        }

        /* TABS */
        .tabs { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { padding: 10px; opacity: 0.4; font-weight: 700; font-size: 0.9rem; cursor: pointer;}
        .tab.active { opacity: 1; color: #2ecc71; border-bottom: 2px solid #2ecc71; }

        .section { display: none; }
        .section.active { display: block; }

        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input {
            flex: 1; background: #1e293b; border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; color: white;
        }

        .chat-box { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 12px; font-size: 0.9rem; max-width: 85%; }
        .user { background: #2ecc71; color: white; margin-left: auto; }
        .bot { background: #334155; color: #cbd5e1; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-group">
            <!-- Avatar par défaut de secours -->
            <img src="votre-photo.jpg" class="profile-mini" onerror="this.src='https://ui-avatars.com/api/?name=Hicham&background=2ecc71&color=fff'">
            <span style="font-weight:800">HICHAM</span>
        </div>
        <div class="clock" id="clock">00:00:00</div>
    </div>

    <div class="container">
        <div class="timer-card">
            <div id="status-badge" class="status-badge" style="background:rgba(46, 204, 113, 0.2); color:#2ecc71;">Jeûne Actif 🔥</div>
            <div class="big-time" id="countdown">00:00:00</div>
            <div id="target-label" style="opacity: 0.6; font-size: 0.9rem;">Temps restant</div>
        </div>

        <div class="actions">
            <button class="btn-main" onclick="toggleDrawer()">Ouvrir mon Dashboard</button>
        </div>
    </div>

    <!-- DRAWER -->
    <div class="drawer" id="drawer">
        <div class="drawer-handle" onclick="toggleDrawer()"></div>

        <div class="tabs">
            <div class="tab active" onclick="showTab(1)">⚖️ POIDS</div>
            <div class="tab" onclick="showTab(2)">📈 PROGRÈS</div>
            <div class="tab" onclick="showTab(3)">🧠 COACH</div>
        </div>

        <!-- TAB 1: POIDS -->
        <div class="section active" id="tab1">
            <p style="opacity:0.6; font-size:0.8rem">Enregistre ton poids :</p>
            <div class="input-group">
                <input id="weightInput" type="number" step="0.1" placeholder="Ex: 82.5 kg">
                <button onclick="addWeight()" style="background:#2ecc71; border:none; border-radius:12px; padding:0 20px; color:white; font-weight:bold; cursor:pointer;">OK</button>
            </div>
        </div>

        <!-- TAB 2: GRAPH -->
        <div class="section" id="tab2">
            <div style="background:rgba(255,255,255,0.02); border-radius:15px; padding:10px; height: 220px;">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <!-- TAB 3: COACH -->
        <div class="section" id="tab3">
            <div class="chat-box" id="chat">
                <div class="msg bot">Salut Hicham ! Comment se passe ton jeûne 18/6 aujourd'hui ?</div>
            </div>
            <div class="input-group">
                <input id="coachInput" placeholder="Ta question...">
                <button onclick="askCoach()" style="background:#f39c12; border:none; border-radius:12px; padding:0 15px; color:white; cursor:pointer;">⚡</button>
            </div>
        </div>
    </div>

<script>
/* ================= SECURITE STOCKAGE ================= */
let weightData = [];
try {
    const saved = localStorage.getItem("hicham_weight");
    if (saved) {
        weightData = JSON.parse(saved);
        if (!Array.isArray(weightData)) weightData = [];
    }
} catch (e) {
    console.log("Erreur de lecture mémoire, réinitialisation.");
    weightData = [];
}

/* ================= LOGIQUE JEÛNE (10h-16h) ================= */
const START_EAT = 10 * 3600; 
const END_EAT = 16 * 3600;

function updateLogic() {
    const now = new Date();
    const t = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
    
    document.getElementById("clock").innerText = now.toLocaleTimeString('fr-FR');

    let remain;
    const badge = document.getElementById("status-badge");
    const timerText = document.getElementById("countdown");

    if(t >= START_EAT && t < END_EAT) {
        remain = END_EAT - t;
        badge.innerText = "Fenêtre Repas 🍽️";
        badge.style.background = "rgba(243, 156, 18, 0.2)";
        badge.style.color = "#f39c12";
        timerText.style.color = "#f39c12";
    } else {
        remain = t >= END_EAT ? (86400 - t + START_EAT) : (START_EAT - t);
        badge.innerText = "Jeûne Actif 🔥";
        badge.style.background = "rgba(46, 204, 113, 0.2)";
        badge.style.color = "#2ecc71";
        timerText.style.color = "#2ecc71";
    }

    const h = String(Math.floor(remain/3600)).padStart(2,'0');
    const m = String(Math.floor((remain%3600)/60)).padStart(2,'0');
    const s = String(remain%60).padStart(2,'0');
    timerText.innerText = `${h}:${m}:${s}`;
}
setInterval(updateLogic, 1000);
updateLogic();

/* ================= UI CONTROLS ================= */
function toggleDrawer() {
    document.getElementById("drawer").classList.toggle("open");
}

function showTab(i) {
    document.querySelectorAll(".section, .tab").forEach(e => e.classList.remove("active"));
    document.getElementById("tab"+i).classList.add("active");
    document.querySelectorAll(".tab")[i-1].classList.add("active");
}

/* ================= GRAPH (SÉCURISÉ) ================= */
let chart;
function initChart() {
    const canvas = document.getElementById("chart");
    if (typeof Chart === 'undefined') {
        canvas.parentNode.innerHTML = "<p style='color:gray;text-align:center;padding-top:50px;'>Graphique indisponible hors ligne.</p>";
        return;
    }

    const ctx = canvas.getContext('2d');
    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: weightData.map(d => d.date),
            datasets: [{
                label: 'Poids (kg)',
                data: weightData.map(d => d.w),
                borderColor: "#2ecc71",
                tension: 0.4,
                fill: false
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } }
        }
    });
}

function addWeight() {
    const input = document.getElementById("weightInput");
    const val = parseFloat(input.value);
    if(!val) return;

    const dateStr = new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'short'});
    weightData.push({date: dateStr, w: val});
    
    try {
        localStorage.setItem("hicham_weight", JSON.stringify(weightData));
    } catch(e) {}
    
    input.value = "";
    if (chart) {
        chart.data.labels = weightData.map(d => d.date);
        chart.data.datasets[0].data = weightData.map(d => d.w);
        chart.update();
    }
    alert("Poids enregistré !");
}

/* ================= COACH IA ================= */
function askCoach() {
    const input = document.getElementById("coachInput");
    const text = input.value.trim().toLowerCase();
    if(!text) return;

    const chat = document.getElementById("chat");
    
    const uDiv = document.createElement("div");
    uDiv.className = "msg user";
    uDiv.innerText = input.value;
    chat.appendChild(uDiv);

    setTimeout(() => {
        let resp = "Je ne suis pas sûr de comprendre, mais continue tes efforts Hicham !";
        if(text.includes("faim")) resp = "C'est normal Hicham, bois de l'eau pétillante ou un café noir sans sucre. Ça va passer en 15 min.";
        if(text.includes("sport")) resp = "Le meilleur moment pour le sport est juste avant ta fenêtre de repas (vers 9h) pour brûler un max de graisses.";
        
        const bDiv = document.createElement("div");
        bDiv.className = "msg bot";
        bDiv.innerText = resp;
        chat.appendChild(bDiv);
        chat.scrollTop = chat.scrollHeight;
    }, 600);

    input.value = "";
}

// Lancement sécurisé au chargement de la page
window.onload = function() {
    initChart();
};
</script>
</body>
</html>
