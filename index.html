<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeûne Premium - Hicham</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
    --green:#2ecc71;
    --orange:#f39c12;
    --bg:#0f172a;
}

*{box-sizing:border-box}

body{
    margin:0;
    font-family:Inter;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* HEADER */
.header{
    width:100%;
    padding:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:15px;
    border:2px solid var(--green);
}

/* TIMER */
.timer{
    margin-top:10px;
    width:300px;
    height:300px;
    border-radius:50%;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
}

svg{
    position:absolute;
    transform:rotate(-90deg);
}

circle{
    fill:none;
    stroke-width:12;
}

.bg{
    stroke:#1f2937;
}

.progress{
    stroke:var(--green);
    stroke-linecap:round;
    transition:0.8s;
}

.time{
    font-size:3rem;
    font-weight:800;
}

.status{
    font-size:0.9rem;
    opacity:0.7;
}

/* CARD */
.card{
    margin-top:20px;
    width:90%;
    max-width:400px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
}

/* TIMELINE */
.timeline{
    position:relative;
    width:90%;
    max-width:400px;
    margin-top:25px;
}

.line{
    position:absolute;
    top:20px;
    left:0;
    right:0;
    height:4px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
}

.step{
    display:flex;
    align-items:center;
    gap:10px;
    margin:18px 0;
    opacity:0.4;
    transform:translateX(-10px);
    transition:0.4s;
}

.step::before{
    content:'';
    width:12px;
    height:12px;
    border-radius:50%;
    background:#555;
    transition:0.4s;
}

.step.active{
    opacity:1;
    transform:translateX(0);
}

.step.active::before{
    background:var(--green);
    box-shadow:0 0 15px var(--green);
}

</style>
</head>

<body>

<div class="header">
    <img src="votre-photo.jpg" class="avatar">
    <div>
        <b>Hicham</b><br>
        <small>Jeûne intelligent</small>
    </div>
</div>

<div class="timer">

<svg width="300" height="300">
    <circle cx="150" cy="150" r="130" class="bg"></circle>
    <circle cx="150" cy="150" r="130" class="progress" id="circle"
        stroke-dasharray="816" stroke-dashoffset="0"></circle>
</svg>

<div class="time" id="time">00:00:00</div>
<div class="status" id="status">JEÛNE</div>

</div>

<div class="card">
    <h3 id="title">Etat du corps</h3>
    <p id="desc">Suivi métabolique en temps réel</p>
</div>

<!-- TIMELINE -->
<div class="timeline">
    <div class="line"></div>

    <div class="step" id="p1">🩸 Glycémie</div>
    <div class="step" id="p2">📉 Insuline</div>
    <div class="step" id="p3">🔥 Graisses</div>
    <div class="step" id="p4">✨ Autophagie</div>
</div>

<script>

const circle = document.getElementById("circle");
const timeEl = document.getElementById("time");
const statusEl = document.getElementById("status");

const TOTAL = 816;

// heures jeûne
const START = 10*3600;
const END = 16*3600;

function update(){

    const now = new Date();
    const t = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();

    let fasting = true;
    let remain;

    if(t>=START && t<END){
        fasting=false;
        remain = END - t;
    }else{
        remain = t>=END
        ? 86400 - t + START
        : START - t;
    }

    const h=Math.floor(remain/3600);
    const m=Math.floor((remain%3600)/60);
    const s=remain%60;

    timeEl.innerText =
        `${h.toString().padStart(2,'0')}:`+
        `${m.toString().padStart(2,'0')}:`+
        `${s.toString().padStart(2,'0')}`;

    statusEl.innerText = fasting ? "JEÛNE 🔥" : "REPAS 🍽";

    circle.style.stroke =
        fasting ? "var(--green)" : "var(--orange)";

    circle.style.strokeDashoffset =
        TOTAL - (remain/(fasting?18*3600:6*3600))*TOTAL;

    updateTimeline(now.getHours());
}

/* ===== TIMELINE ===== */

function updateTimeline(hour){

    let phase = 1;

    if(hour < 4) phase = 1;
    else if(hour < 8) phase = 2;
    else if(hour < 12) phase = 3;
    else phase = 4;

    document.querySelectorAll(".step").forEach(e=>{
        e.classList.remove("active");
    });

    document.getElementById("p"+phase).classList.add("active");

    setCard(phase);
}

function setCard(p){

    if(p===1){
        document.getElementById("title").innerText="Glycémie active";
        document.getElementById("desc").innerText="Utilisation du glucose du dernier repas";
    }

    if(p===2){
        document.getElementById("title").innerText="Insuline en baisse";
        document.getElementById("desc").innerText="Transition vers les réserves internes";
    }

    if(p===3){
        document.getElementById("title").innerText="Brûlage des graisses";
        document.getElementById("desc").innerText="Lipolyse activée, perte de graisse";
    }

    if(p===4){
        document.getElementById("title").innerText="Autophagie";
        document.getElementById("desc").innerText="Nettoyage cellulaire et régénération";
    }
}

setInterval(update,1000);
update();

</script>

</body>
</html>
