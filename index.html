<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hicham Fasting Expert</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71; --accent: #f39c12; --bg: #090e1a;
            --card-bg: rgba(22, 28, 45, 0.7); --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(9, 14, 26, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .profile-area { display: flex; align-items: center; gap: 10px; }
        .profile-area img { width: 42px; height: 42px; border-radius: 12px; border: 2px solid var(--primary); object-fit: cover; }

        .scroll-container {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
            padding-bottom: 140px; /* Espace pour la barre de navigation */
        }

        /* TIMER DESIGN */
        .timer-card {
            background: var(--card-bg); padding: 30px 20px; border-radius: 35px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .progress-ring { position: relative; width: 210px; height: 210px; margin: 0 auto; }
        .progress-ring svg { transform: rotate(-90deg); width: 210px; height: 210px; }
        .progress-ring circle { fill: none; stroke-width: 14; stroke-linecap: round; }
        .circle-bg { stroke: rgba(255,255,255,0.05); }
        .circle-val { stroke: var(--primary); transition: stroke-dashoffset 1s linear; stroke-dasharray: 596; stroke-dashoffset: 596; }

        .timer-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; }
        #countdown { font-size: 2.8rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        #phase-name-timer { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: var(--primary); margin-top: 5px; display: block; letter-spacing: 1px; }

        /* PHASES GRID */
        .phases-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .ph-box { background: var(--card-bg); padding: 12px 5px; border-radius: 18px; text-align: center; opacity: 0.3; transition: 0.3s; border: 1.5px solid transparent; }
        .ph-box.active { opacity: 1; border-color: var(--primary); background: rgba(46, 204, 113, 0.1); }
        .ph-box i { font-size: 1.3rem; display: block; }
        .ph-box span { font-size: 0.55rem; font-weight: 800; display: block; margin-top: 4px; color: #94a3b8; }

        /* INFO BOX */
        .info-card { background: var(--card-bg); padding: 22px; border-radius: 28px; border-left: 5px solid var(--primary); }
        #info-title { margin: 0; color: var(--primary); font-size: 1rem; font-weight: 800; }
        #info-desc { font-size: 0.85rem; color: #cbd5e1; margin-top: 10px; line-height: 1.6; }

        /* NAV BAR */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(15px); display: flex; justify-content: space-around;
            padding: 12px 0 30px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 2000;
        }
        .nav-item { font-size: 1.5rem; opacity: 0.3; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        .drawer {
            position: fixed; bottom: 0; width: 100%; background: #0f172a; height: 60vh;
            border-radius: 35px 35px 0 0; transform: translateY(100%); transition: 0.4s ease-out; z-index: 3000; padding: 25px;
        }
        .drawer.open { transform: translateY(0); }
        .drawer-handle { width: 45px; height: 5px; background: #334155; border-radius: 10px; margin: -10px auto 20px; }
        .btn-save { background: var(--primary); border: none; width: 100%; padding: 16px; border-radius: 15px; color: white; font-weight: 800; margin-top: 15px; }

        canvas { width: 100% !important; max-height: 220px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-area">
            <img src="votre-photo.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Hicham&background=2ecc71&color=fff'">
            <div style="font-weight: 800; font-size: 0.95rem;">Dashboard Hicham</div>
        </div>
        <div id="top-clock" style="font-weight: 800; opacity: 0.5;">00:00</div>
    </div>

    <div class="scroll-container" id="main-view">
        
        <div class="timer-card">
            <div class="progress-ring">
                <svg viewBox="0 0 210 210">
                    <circle class="circle-bg" cx="105" cy="105" r="95"></circle>
                    <circle id="circle-progress" class="circle-val" cx="105" cy="105" r="95" stroke-dasharray="596" stroke-dashoffset="596"></circle>
                </svg>
                <div class="timer-content">
                    <span id="status-label" style="font-size:0.65rem; font-weight:800; opacity:0.6;">TEMPS RESTANT</span>
                    <h1 id="countdown">00:00:00</h1>
                    <span id="phase-name-timer">ANALYSE...</span>
                </div>
            </div>
        </div>

        <div class="phases-row">
            <div id="p1" class="ph-box"><i>🧪</i><span>SUCRE</span></div>
            <div id="p2" class="ph-box"><i>📉</i><span>INSULINE</span></div>
            <div id="p3" class="ph-box"><i>🔥</i><span>KÉTOSE</span></div>
            <div id="p4" class="ph-box"><i>✨</i><span>AUTO-P</span></div>
        </div>

        <div class="info-card" id="info-card">
            <h4 id="info-title">Calcul de la phase...</h4>
            <p id="info-desc">Mise à jour de vos données métaboliques en cours.</p>
        </div>

    </div>

    <div class="scroll-container" id="graph-view" style="display:none;">
        <h3 style="font-weight:800;">Évolution du poids</h3>
        <div style="background:var(--card-bg); padding:15px; border-radius:25px; border: 1px solid rgba(255,255,255,0.05);">
            <canvas id="weightChart"></canvas>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-home" onclick="showTab('main')">🏠</div>
        <div class="nav-item" onclick="toggleDrawer()">⚖️</div>
        <div class="nav-item" id="nav-graph" onclick="showTab('graph')">📈</div>
    </div>

    <div class="drawer" id="drawer">
        <div class="drawer-handle" onclick="toggleDrawer()"></div>
        <h3 style="margin:0;">Nouveau poids (kg)</h3>
        <input type="number" id="weight-input" placeholder="Ex: 82.5" step="0.1">
        <button class="btn-save" onclick="saveWeight()">ENREGISTRER</button>
    </div>

<script>
/* ================= DONNÉES SCIENTIFIQUES ================= */
const E_START = 10; const E_END = 16;
const pData = {
    1: { n: "Hausse Glycémique", t: "Étape 1 : Digestion", d: "Hicham, ton corps décompose ton dernier repas. Ton taux de sucre dans le sang monte et l'insuline est active pour stocker l'énergie dans tes muscles et ton foie." },
    2: { n: "Baisse de l'Insuline", t: "Étape 2 : Chute de l'Insuline", d: "Après 4h, l'insuline redescend. Ton corps commence à puiser dans le glycogène (sucre stocké). C'est le début de la transition vers le brûlage des graisses." },
    3: { n: "Zone Brûle-Graisse", t: "Étape 3 : Cétose Active", d: "Tes réserves de sucre sont épuisées. Ton foie transforme maintenant tes graisses en cétones pour alimenter ton cerveau et tes muscles. Ton énergie devient stable." },
    4: { n: "Régénération Cellulaire", t: "Étape 4 : Autophagie Intense", d: "Phase d'élite ! Tes cellules s'auto-nettoient en recyclant les protéines usées. C'est un puissant mécanisme anti-âge et de renforcement immunitaire." }
};

function update() {
    const now = new Date();
    const h = now.getHours(); const m = now.getMinutes(); const s = now.getSeconds();
    const totS = h*3600 + m*60 + s;
    document.getElementById('top-clock').innerText = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});

    let isF = true; let rem = 0; let totWin = 18*3600;

    if(h >= E_START && h < E_END) {
        isF = false; rem = (E_END*3600) - totS; totWin = 6*3600;
        setUI("FENÊTRE REPAS 🍽️", "var(--accent)", "Alimentation active");
        updatePhases(-1);
    } else {
        isF = true; rem = h >= E_END ? (86400 - totS + E_START*3600) : (E_START*3600 - totS);
        setUI("JEÛNE ACTIF 🔥", "var(--primary)", "");
        let fH = h >= 16 ? h - 16 : h + 8;
        updatePhases(fH);
    }

    const hr = Math.floor(rem/3600); const mn = Math.floor((rem%3600)/60); const sc = rem%60;
    document.getElementById('countdown').innerText = `${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;

    const circle = document.getElementById('circle-progress');
    const offset = 596 - (rem / totWin) * 596;
    circle.style.strokeDashoffset = offset;
    circle.style.stroke = isF ? "var(--primary)" : "var(--accent)";
}

function setUI(t, c, phaseName) {
    document.getElementById('countdown').style.color = c;
    if(phaseName) document.getElementById('phase-name-timer').innerText = phaseName;
    document.getElementById('phase-name-timer').style.color = c;
    document.getElementById('info-card').style.borderColor = c;
}

function updatePhases(h) {
    document.querySelectorAll('.ph-box').forEach(b => b.classList.remove('active'));
    const t = document.getElementById('info-title'); const d = document.getElementById('info-desc');
    const timerLabel = document.getElementById('phase-name-timer');

    if(h < 0) {
        t.innerText = "Recharge Nutritive"; d.innerText = "Focus sur les protéines et les fibres Hicham. Prépare ton corps pour le prochain jeûne de 18h.";
        return;
    }
    
    let p = 1;
    if(h >= 16) p = 4; else if(h >= 12) p = 3; else if(h >= 4) p = 2;
    
    document.getElementById('p'+p).classList.add('active');
    t.innerText = pData[p].t;
    d.innerText = pData[p].d;
    timerLabel.innerText = pData[p].n;
}

/* ================= UTILS ================= */
function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); }
function showTab(t) {
    document.getElementById('main-view').style.display = t === 'main' ? 'flex' : 'none';
    document.getElementById('graph-view').style.display = t === 'graph' ? 'flex' : 'none';
    document.getElementById('nav-home').classList.toggle('active', t === 'main');
    document.getElementById('nav-graph').classList.toggle('active', t === 'graph');
    if(t === 'graph') loadChart();
}
let weights = JSON.parse(localStorage.getItem('h_w_pro') || '[]');
function saveWeight() {
    const v = document.getElementById('weight-input').value; if(!v) return;
    weights.push({d: new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}), v: parseFloat(v)});
    localStorage.setItem('h_w_pro', JSON.stringify(weights));
    toggleDrawer(); alert("Poids enregistré !");
}
let ch = null;
function loadChart() {
    const ctx = document.getElementById('weightChart').getContext('2d');
    if(ch) ch.destroy();
    ch = new Chart(ctx, {
        type: 'line',
        data: { labels: weights.slice(-7).map(x=>x.d), datasets: [{label:'kg', data:weights.slice(-7).map(x=>x.v), borderColor:'#2ecc71', tension:0.4, fill:true, backgroundColor:'rgba(46,204,113,0.1)'}]},
        options: { responsive:true, maintainAspectRatio:false, plugins: { legend: { display: false } } }
    });
}
setInterval(update, 1000); update();
</script>
</body>
</html>
