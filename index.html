<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hicham Ultimate V2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71; --accent: #f39c12; --bg: #09101d;
            --card: #1a2235; --sleep: #6366f1; --text: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(9, 16, 29, 0.95); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .profile { display: flex; align-items: center; gap: 10px; }
        .profile img { width: 40px; height: 40px; border-radius: 12px; border: 2px solid var(--primary); object-fit: cover; }

        .app-main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 140px; }

        /* TIMER */
        .timer-card { background: var(--card); padding: 25px; border-radius: 40px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .ring-box { position: relative; width: 210px; height: 210px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .ring-box svg { transform: rotate(-90deg); position: absolute; width: 210px; height: 210px; }
        .ring-fill { fill: none; stroke: var(--primary); stroke-width: 12; stroke-linecap: round; stroke-dasharray: 596; stroke-dashoffset: 596; transition: 1s; }
        #countdown { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
        .btn-stop { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 15px; font-weight: 800; font-size: 0.8rem; cursor: pointer; }

        /* SLEEP WIDGET */
        .sleep-card { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 20px; border-radius: 30px; }
        .sleep-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-sleep { background: white; color: var(--sleep); border: none; padding: 10px 18px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 0.75rem; }
        .btn-manual-sleep { color: white; font-size: 0.7rem; text-decoration: underline; background: none; border: none; opacity: 0.8; cursor: pointer; }

        /* HISTORY */
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item { background: var(--card); padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); }
        .history-item.sleep { border-left-color: var(--sleep); }

        /* NAV */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0b121f; display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { font-size: 1.5rem; opacity: 0.3; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        /* DRAWERS */
        .drawer { position: fixed; bottom: 0; width: 100%; background: #0f172a; border-radius: 35px 35px 0 0; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 2000; padding: 30px; }
        .drawer.open { transform: translateY(0); }
        .handle { width: 50px; height: 4px; background: #334155; border-radius: 10px; margin: -15px auto 25px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 5px; font-weight: 700; }
        input { width: 100%; background: #1e293b; border: 1px solid #334155; padding: 15px; color: white; border-radius: 12px; font-family: inherit; }
        .btn-block { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .bg-green { background: var(--primary); color: white; }
        .bg-sleep { background: var(--sleep); color: white; }
        .bg-dark { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile">
            <img src="votre-photo.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Hicham&background=2ecc71&color=fff'">
            <span style="font-weight: 800;">Hicham Health Manager</span>
        </div>
        <div id="clock" style="opacity: 0.5; font-size: 0.8rem; font-weight: 700;">00:00</div>
    </div>

    <div class="app-main" id="view-main">
        <!-- FASTING -->
        <div class="timer-card">
            <span id="fast-label" style="font-size:0.7rem; font-weight:800; color:var(--primary);">JEÛNE ACTIF 🔥</span>
            <div class="ring-box">
                <svg><circle cx="105" cy="105" r="95" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="12"></circle>
                <circle id="ring-fill" class="ring-fill" cx="105" cy="105" r="95"></circle></svg>
                <div style="z-index:10; text-align:center;">
                    <div id="countdown">00:00:00</div>
                    <button class="btn-stop" onclick="stopFasting()">STOP JEÛNE</button>
                </div>
            </div>
            <p id="info-phase" style="font-size: 0.75rem; color: #64748b; margin-top: 10px;">Analyse métabolique...</p>
        </div>

        <!-- SLEEP -->
        <div class="sleep-card">
            <div class="sleep-header">
                <div>
                    <h4 style="margin:0;">Sommeil</h4>
                    <p id="sleep-status" style="margin:2px 0 0; font-size:0.7rem; opacity:0.8;">Session auto</p>
                </div>
                <button class="btn-sleep" id="sleep-toggle" onclick="toggleSleep()">🛌 COUCHER</button>
            </div>
            <button class="btn-manual-sleep" onclick="openDrawer('sleep-manual')">➕ Saisie manuelle (Oubli ?)</button>
        </div>

        <h3 style="margin:0; font-size:0.9rem;">Dernières activités</h3>
        <div id="recent-list" class="history-list"></div>
    </div>

    <!-- VIEW HISTORY -->
    <div class="app-main" id="view-history" style="display:none;">
        <h2 style="margin-bottom:20px;">Journal Complet</h2>
        <div id="full-list" class="history-list"></div>
        <button class="btn-block bg-dark" onclick="exportMasterData()">💾 EXPORTER LE JOURNAL (.JSON)</button>
    </div>

    <!-- VIEW STATS -->
    <div class="app-main" id="view-stats" style="display:none;">
        <h3>Progression Poids</h3>
        <canvas id="wChart"></canvas>
        <button class="btn-block bg-green" onclick="openDrawer('poids')">⚖️ AJOUTER POIDS</button>
    </div>

    <!-- NAV BAR -->
    <div class="nav-bar">
        <div class="nav-item active" id="nav-main" onclick="showTab('main')">🏠</div>
        <div class="nav-item" id="nav-stats" onclick="showTab('stats')">📊</div>
        <div class="nav-item" id="nav-history" onclick="showTab('history')">📜</div>
    </div>

    <!-- DRAWER POIDS -->
    <div class="drawer" id="drawer-poids">
        <div class="handle" onclick="closeDrawers()"></div>
        <h3>Ajouter Poids</h3>
        <input type="number" id="w-input" step="0.1" placeholder="82.5 kg">
        <button class="btn-block bg-green" onclick="saveW()">ENREGISTRER</button>
    </div>

    <!-- DRAWER SOMMEIL MANUEL -->
    <div class="drawer" id="drawer-sleep-manual">
        <div class="handle" onclick="closeDrawers()"></div>
        <h3>Oubli Sommeil</h3>
        <div class="form-group">
            <label>Heure du coucher</label>
            <input type="datetime-local" id="manual-sleep-start">
        </div>
        <div class="form-group">
            <label>Heure du réveil</label>
            <input type="datetime-local" id="manual-sleep-end">
        </div>
        <button class="btn-block bg-sleep" onclick="saveManualSleep()">VALIDER LA NUIT</button>
    </div>

<script>
/* ================= SYSTEM DATA ================= */
const DB_LOGS = 'HICHAM_LOGS_V2';
const DB_WEIGHTS = 'HICHAM_WEIGHTS_V2';
const DB_SLEEP_START = 'HICHAM_SLEEP_START';

let logs = JSON.parse(localStorage.getItem(DB_LOGS) || '[]');
let weights = JSON.parse(localStorage.getItem(DB_WEIGHTS) || '[]');

function update() {
    const now = new Date();
    const h = now.getHours(); const totS = h*3600 + now.getMinutes()*60 + now.getSeconds();
    document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});

    let isF = (h < 10 || h >= 16);
    let rem = isF ? (h >= 16 ? (86400 - totS + 36000) : (36000 - totS)) : (57600 - totS);
    let totWin = isF ? 18*3600 : 6*3600;

    document.getElementById('countdown').innerText = formatTime(rem);
    document.getElementById('fast-label').innerText = isF ? "JEÛNE ACTIF 🔥" : "FENÊTRE REPAS 🍽️";
    document.getElementById('fast-label').style.color = isF ? "var(--primary)" : "var(--accent)";
    document.getElementById('ring-fill').style.stroke = isF ? "var(--primary)" : "var(--accent)";
    document.getElementById('ring-fill').style.strokeDashoffset = 596 - (rem / totWin) * 596;
    
    checkSleepStatus();
}

function formatTime(s) {
    const hr = Math.floor(s/3600); const mn = Math.floor((s%3600)/60); const sc = s%60;
    return `${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

/* ================= ACTIONS ================= */
function stopFasting() {
    if(!confirm("Arrêter le jeûne et enregistrer ?")) return;
    addLog('JEÛNE', 'Terminé à ' + new Date().toLocaleTimeString(), 'primary');
    alert("Bravo ! Session sauvée.");
}

function toggleSleep() {
    const start = localStorage.getItem(DB_SLEEP_START);
    if(!start) {
        localStorage.setItem(DB_SLEEP_START, new Date().getTime());
        alert("Bonne nuit !");
    } else {
        const end = new Date().getTime();
        const dur = ((end - parseInt(start)) / 3600000).toFixed(1);
        addLog('SOMMEIL', `Nuit de ${dur}h (Auto)`, 'sleep');
        localStorage.removeItem(DB_SLEEP_START);
        alert(`Réveil enregistré : ${dur}h.`);
    }
    checkSleepStatus();
}

function saveManualSleep() {
    const start = document.getElementById('manual-sleep-start').value;
    const end = document.getElementById('manual-sleep-end').value;
    if(!start || !end) return alert("Remplis les deux dates !");

    const dur = ((new Date(end) - new Date(start)) / 3600000).toFixed(1);
    if(dur <= 0) return alert("L'heure de réveil doit être après le coucher !");

    addLog('SOMMEIL', `Nuit de ${dur}h (Manuel)`, 'sleep');
    closeDrawers();
    alert(`Nuit manuelle enregistrée : ${dur}h.`);
}

function checkSleepStatus() {
    const start = localStorage.getItem(DB_SLEEP_START);
    document.getElementById('sleep-status').innerText = start ? "Dodo en cours..." : "Pas de session";
    document.getElementById('sleep-toggle').innerText = start ? "☀️ RÉVEIL" : "🛌 COUCHER";
}

function addLog(type, desc, color) {
    logs.unshift({ type, desc, color, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString() });
    localStorage.setItem(DB_LOGS, JSON.stringify(logs.slice(0, 100)));
    renderHistory();
}

function renderHistory() {
    const html = logs.map(l => `<div class="history-item ${l.color === 'sleep' ? 'sleep' : ''}"><div><b>${l.type}</b><br><span style="font-size:0.7rem; opacity:0.8">${l.desc}</span></div><span style="font-size:0.7rem">${l.date}</span></div>`).join('');
    document.getElementById('recent-list').innerHTML = logs.slice(0, 3).map(l => `<div class="history-item ${l.color === 'sleep' ? 'sleep' : ''}" style="padding:10px; font-size:0.8rem"><b>${l
