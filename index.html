<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hicham Master - Fasting Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #F7F3EF;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255, 255, 255, 0.9);
            --accent-primary: #D4A574;
            --accent-secondary: #8B7355;
            --accent-success: #6B8E6B;
            --accent-sleep: #7B8CDE;
            --text-primary: #2D2A26;
            --text-secondary: #8B8680;
            --shadow-soft: 0 4px 20px rgba(139, 115, 85, 0.08);
            --btn-height: 60px;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        
        body { 
            margin: 0; background: var(--bg-primary); color: var(--text-primary); 
            height: 100dvh; overflow: hidden; position: fixed; width: 100%;
        }

        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }

        .header { 
            padding: 16px 20px; padding-top: max(16px, env(safe-area-inset-top));
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--bg-secondary); border-bottom: 1px solid rgba(139, 115, 85, 0.08);
        }

        .app-view { 
            flex: 1; overflow-y: auto; padding: 16px 20px 100px; 
            display: none; flex-direction: column; gap: 16px; 
        }
        .app-view.active { display: flex; }

        .timer-card { 
            background: var(--bg-card); padding: 24px; border-radius: 32px; 
            text-align: center; box-shadow: var(--shadow-soft); border: 1px solid rgba(139, 115, 85, 0.05);
        }

        .ring-container { 
            position: relative; width: 220px; height: 220px; margin: 0 auto 20px; 
            display: flex; align-items: center; justify-content: center; 
        }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .ring-bg { fill: none; stroke: rgba(139, 115, 85, 0.1); stroke-width: 10; }
        .ring-fill { 
            fill: none; stroke: var(--accent-primary); stroke-width: 10; 
            stroke-linecap: round; stroke-dasharray: 565; stroke-dashoffset: 565; 
            transition: stroke-dashoffset 0.5s ease, stroke 0.5s ease; 
        }

        #countdown { font-size: 2.5rem; font-weight: 800; margin-bottom: 4px; letter-spacing: -1px; }
        
        .btn-primary {
            height: var(--btn-height); width: 100%; max-width: 280px;
            border-radius: 20px; border: none; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.2s; color: white;
            background: linear-gradient(135deg, var(--accent-success), #8FBC8F);
        }
        .btn-primary:active { transform: scale(0.96); }
        .btn-stop { background: linear-gradient(135deg, #E07A5F, var(--accent-primary)); }

        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95);
            display: flex; justify-content: space-around; padding: 12px 0 max(12px, env(safe-area-inset-bottom));
            border-top: 1px solid rgba(139,115,85,0.1); backdrop-filter: blur(10px);
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            color: var(--text-secondary); font-size: 0.7rem; gap: 4px; cursor: pointer;
            padding: 8px 12px;
        }
        .nav-item.active { color: var(--accent-primary); font-weight: 700; }

        .phase-detail-card {
            background: var(--bg-secondary); padding: 16px; border-radius: 20px;
            text-align: left; border: 1px solid rgba(139, 115, 85, 0.1);
        }
        
        .phase-1 { stroke: #E6A75C; } 
        .phase-2 { stroke: #D4A574; } 
        .phase-3 { stroke: #6B8E6B; } 
        .phase-4 { stroke: #7B8CDE; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size:1.2rem;">Hicham Master</h1>
            <span style="font-size:0.8rem; color:var(--text-secondary);" id="date-display">--</span>
        </div>
        <div class="profile">
            <img src="https://ui-avatars.com/api/?name=Hicham&background=D4A574&color=fff" style="width:40px; border-radius:10px;">
        </div>
    </div>

    <div class="app-view active" id="view-home">
        <div class="timer-card">
            <div id="fast-info-box" style="display:none; margin-bottom:15px; font-size:0.9rem;">
                Démarré : <b id="start-time-text">--:--</b> 
                <button onclick="editStartTime()" style="border:none; background:none;">✏️</button>
            </div>
            <div class="ring-container">
                <svg viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="90" class="ring-bg"></circle>
                    <circle id="ring-fill" class="ring-fill" cx="100" cy="100" r="90"></circle>
                </svg>
                <div style="position:absolute;">
                    <div id="countdown">00:00:00</div>
                    <div id="timer-label" style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:15px;">Fenêtre repas</div>
                    <button id="main-action-btn" class="btn-primary" onclick="handleAction()">Démarrer</button>
                </div>
            </div>
            <div class="phase-detail-card">
                <div id="p-title" style="font-weight:700; margin-bottom:5px;">🍽️ Alimentation</div>
                <div id="p-desc" style="font-size:0.8rem; color:var(--text-secondary);">Le corps utilise le glucose.</div>
            </div>
        </div>
    </div>

    <div class="app-view" id="view-stats">
        <h2 style="font-size:1.1rem;">Mes Statistiques</h2>
        <div style="background:white; padding:20px; border-radius:24px; text-align:center;">
            <p style="color:var(--text-secondary);">Graphiques à venir...</p>
        </div>
    </div>

    <div class="app-view" id="view-history">
        <h2 style="font-size:1.1rem;">Historique</h2>
        <div id="history-list" style="display:flex; flex-direction:column; gap:10px;">
            <p style="text-align:center; color:var(--text-secondary);">Aucun historique pour le moment.</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-home" onclick="switchTab('home')">🏠<span>Accueil</span></div>
        <div class="nav-item" id="nav-stats" onclick="switchTab('stats')">📈<span>Stats</span></div>
        <div class="nav-item" id="nav-history" onclick="switchTab('history')">📜<span>Historique</span></div>
    </div>
</div>

<script>
    const KEY_START = 'FAST_START_v3';
    let settings = { duration: 16 };

    const PHASES = [
        { title: "🍽️ Alimentation", desc: "Le corps utilise le glucose. L'insuline est élevée." },
        { title: "📉 Post-Absorption", desc: "4h-12h : Le taux de sucre baisse." },
        { title: "⚡ Néoglucogenèse", desc: "12h-16h : Brûlage du glucose stocké." },
        { title: "🔥 Cétose", desc: "16h-24h : Brûlage intensif des graisses." },
        { title: "🧬 Autophagie", desc: "24h+ : Régénération cellulaire." }
    ];

    function init() {
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
        setInterval(update, 1000);
        update();
    }

    // FONCTION DE NAVIGATION (Correction du bug)
    function switchTab(tabId) {
        // Désactiver toutes les vues
        document.querySelectorAll('.app-view').forEach(view => view.classList.remove('active'));
        // Désactiver tous les items nav
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        
        // Activer la vue et l'item sélectionnés
        document.getElementById('view-' + tabId).classList.add('active');
        document.getElementById('nav-' + tabId).classList.add('active');
    }

    function update() {
        const start = localStorage.getItem(KEY_START);
        const actionBtn = document.getElementById('main-action-btn');
        const ring = document.getElementById('ring-fill');
        const circum = 565; // 2 * PI * 90

        if (start) {
            const elapsed = (Date.now() - parseInt(start)) / 1000;
            const remaining = Math.max(0, (settings.duration * 3600) - elapsed);
            const progress = Math.min(1, elapsed / (settings.duration * 3600));

            document.getElementById('countdown').innerText = formatTime(remaining);
            document.getElementById('timer-label').innerText = "Temps restant";
            actionBtn.innerText = "Arrêter";
            actionBtn.classList.add('btn-stop');
            document.getElementById('fast-info-box').style.display = 'block';
            document.getElementById('start-time-text').innerText = new Date(parseInt(start)).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            ring.style.strokeDashoffset = circum - (progress * circum);

            const hours = elapsed / 3600;
            let pIdx = hours < 4 ? 0 : hours < 12 ? 1 : hours < 16 ? 2 : hours < 24 ? 3 : 4;
            document.getElementById('p-title').innerText = PHASES[pIdx].title;
            document.getElementById('p-desc').innerText = PHASES[pIdx].desc;
            ring.className = `ring-fill phase-${pIdx}`;
        } else {
            document.getElementById('countdown').innerText = "00:00:00";
            document.getElementById('timer-label').innerText = "Fenêtre repas";
            actionBtn.innerText = "Démarrer";
            actionBtn.classList.remove('btn-stop');
            document.getElementById('fast-info-box').style.display = 'none';
            ring.style.strokeDashoffset = circum;
        }
    }

    function handleAction() {
        if (localStorage.getItem(KEY_START)) {
            if(confirm("Terminer le jeûne ?")) localStorage.removeItem(KEY_START);
        } else {
            localStorage.setItem(KEY_START, Date.now());
        }
        update();
    }

    function editStartTime() {
        const current = localStorage.getItem(KEY_START);
        if (!current) return;
        const h = prompt("Heure (0-23) ?", new Date(parseInt(current)).getHours());
        const m = prompt("Minutes (0-59) ?", new Date(parseInt(current)).getMinutes());
        if (h !== null && m !== null) {
            const d = new Date(); d.setHours(h, m, 0);
            if (d > Date.now()) d.setDate(d.getDate() - 1);
            localStorage.setItem(KEY_START, d.getTime());
            update();
        }
    }

    function formatTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = Math.floor(s % 60);
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    init();
</script>

</body>
</html>
