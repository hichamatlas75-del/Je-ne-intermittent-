<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fastic Clone - Hicham</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fastic-green: #2ecc71;
            --fastic-orange: #f39c12;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Header Profil */
        .header {
            width: 100%;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
        }

        .profile-pic {
            width: 50px; height: 50px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid var(--fastic-green);
        }

        .user-info h2 { margin: 0; font-size: 1.1rem; }
        .user-info p { margin: 0; font-size: 0.8rem; color: var(--text-sub); }

        /* Main Dashboard */
        .main-container {
            flex: 1;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        /* Le Timer Circulaire */
        .timer-section {
            position: relative;
            width: 280px; height: 280px;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .timer-circle-svg {
            position: absolute;
            transform: rotate(-90deg);
        }

        .countdown-val { font-size: 3rem; font-weight: 700; color: var(--text-main); margin: 0; }
        .countdown-label { font-size: 0.9rem; color: var(--text-sub); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* Phases de Jeûne (Interaction style Fastic) */
        .phases-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
        }

        .phase-step {
            width: 55px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .phase-step:active { transform: scale(0.9); }

        .step-icon {
            width: 45px; height: 45px;
            border-radius: 14px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .step-label { font-size: 0.65rem; font-weight: 700; color: var(--text-sub); }

        .phase-active .step-icon { background: var(--fastic-green); color: white; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }
        .phase-active .step-label { color: var(--fastic-green); }

        /* Carte d'information */
        .info-card {
            background: white;
            padding: 20px;
            border-radius: 24px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border-left: 5px solid var(--fastic-green);
        }

        .info-card h3 { margin: 0 0 10px; font-size: 1rem; color: var(--fastic-green); }
        .info-card p { margin: 0; font-size: 0.9rem; line-height: 1.5; color: var(--text-sub); }

        /* Navigation Basse (Style App) */
        .nav-bar {
            width: 100%;
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #eee;
        }
        .nav-item { font-size: 1.2rem; color: #ccc; }
        .nav-item.active { color: var(--fastic-green); }

    </style>
</head>
<body>

    <div class="header">
        <img src="votre-photo.jpg" alt="Hicham" class="profile-pic">
        <div class="user-info">
            <h2>Hicham</h2>
            <p>Objectif : Santé & Longévité</p>
        </div>
    </div>

    <div class="main-container">
        <!-- Section Timer -->
        <div class="timer-section">
            <svg class="timer-circle-svg" width="280" height="280">
                <circle cx="140" cy="140" r="130" fill="none" stroke="#f1f2f6" stroke-width="12"></circle>
                <circle id="progress-bar" cx="140" cy="140" r="130" fill="none" stroke="#2ecc71" stroke-width="12" stroke-dasharray="816.8" stroke-dashoffset="0" stroke-linecap="round" style="transition: stroke-dashoffset 1s linear;"></circle>
            </svg>
            <p id="timer-label" class="countdown-label">Temps restant</p>
            <h1 id="countdown" class="countdown-val">00:00:00</h1>
            <p id="status-text" style="font-size: 0.8rem; margin-top: 10px; font-weight: 600;"></p>
        </div>

        <!-- Phases Interactives -->
        <div class="phases-row">
            <div class="phase-step" onclick="selectPhase(1)" id="step1">
                <div class="step-icon">🩸</div>
                <div class="step-label">GLYCÉMIE</div>
            </div>
            <div class="phase-step" onclick="selectPhase(2)" id="step2">
                <div class="step-icon">📉</div>
                <div class="step-label">INSULINE</div>
            </div>
            <div class="phase-step" onclick="selectPhase(3)" id="step3">
                <div class="step-icon">🔥</div>
                <div class="step-label">GRAISSES</div>
            </div>
            <div class="phase-step" onclick="selectPhase(4)" id="step4">
                <div class="step-icon">✨</div>
                <div class="step-label">CELLULES</div>
            </div>
        </div>

        <!-- Carte d'info dynamique -->
        <div class="info-card">
            <h3 id="phase-title">État actuel du corps</h3>
            <p id="phase-desc">Cliquez sur une phase ci-dessus pour comprendre les bénéfices sur votre santé.</p>
        </div>
    </div>

    <!-- Navigation Fake -->
    <div class="nav-bar">
        <div class="nav-item active">🔥</div>
        <div class="nav-item">📊</div>
        <div class="nav-item">💧</div>
        <div class="nav-item">👤</div>
    </div>

<script>
    const phaseData = {
        1: { t: "Phase 1 : Digestion & Glycémie", d: "Votre corps traite les glucides du dernier repas. Votre glycémie commence à redescendre doucement.", icon: "🩸" },
        2: { t: "Phase 2 : Chute de l'Insuline", d: "Après 8h, l'insuline est au plus bas. C'est le signal pour que le corps commence à chercher de l'énergie ailleurs.", icon: "📉" },
        3: { t: "Phase 3 : Brûlage des Graisses", d: "Entre 12h et 16h de jeûne, votre corps passe en mode 'Kétose'. Vous brûlez vos réserves de gras !", icon: "🔥" },
        4: { t: "Phase 4 : Autophagie (Nettoyage)", d: "Phase ultime (16h+). Vos cellules se régénèrent et éliminent les protéines défectueuses. Santé pure.", icon: "✨" }
    };

    function updateApp() {
        const now = new Date();
        const hrs = now.getHours();
        const mins = now.getMinutes();
        const secs = now.getSeconds();
        const currentTotalSecs = (hrs * 3600) + (mins * 60) + secs;

        const startEating = 10 * 3600; // 10h
        const endEating = 16 * 3600;   // 16h
        
        let isFasting = true;
        let timeLeft = 0;
        let totalWindow = 18 * 3600;

        if (currentTotalSecs >= startEating && currentTotalSecs < endEating) {
            isFasting = false;
            timeLeft = endEating - currentTotalSecs;
            totalWindow = 6 * 3600;
        } else {
            isFasting = true;
            if (currentTotalSecs >= endEating) {
                timeLeft = (24 * 3600 - currentTotalSecs) + startEating;
            } else {
                timeLeft = startEating - currentTotalSecs;
            }
        }

        // Affichage Timer
        const h = Math.floor(timeLeft / 3600);
        const m = Math.floor((timeLeft % 3600) / 60);
        const s = timeLeft % 60;
        document.getElementById('countdown').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        
        // Style selon l'état
        const progressCircle = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        
        if (isFasting) {
            progressCircle.style.stroke = "var(--fastic-green)";
            statusText.innerText = "JEÛNE EN COURS";
            statusText.style.color = "var(--fastic-green)";
            autoSelectPhase(hrs);
        } else {
            progressCircle.style.stroke = "var(--fastic-orange)";
            statusText.innerText = "FENÊTRE REPAS";
            statusText.style.color = "var(--fastic-orange)";
            document.getElementById('phase-title').innerText = "Bon Appétit Hicham !";
            document.getElementById('phase-desc').innerText = "Profitez de cette fenêtre pour manger sainement. Prochain jeûne à 16:00.";
        }

        // Animation du cercle
        const circumference = 816.8;
        const offset = circumference - (timeLeft / totalWindow) * circumference;
        progressCircle.style.strokeDashoffset = offset;
    }

    function selectPhase(id) {
        document.querySelectorAll('.phase-step').forEach(s => s.classList.remove('phase-active'));
        document.getElementById('step'+id).classList.add('phase-active');
        document.getElementById('phase-title').innerText = phaseData[id].t;
        document.getElementById('phase-desc').innerText = phaseData[id].d;
    }

    function autoSelectPhase(h) {
        // Logique simplifiée pour surligner la phase actuelle pendant le jeûne
        if (h >= 16 && h < 20) selectPhase(1);
        else if (h >= 20 || h < 2) selectPhase(2);
        else if (h >= 2 && h < 7) selectPhase(3);
        else if (h >= 7 && h < 10) selectPhase(4);
    }

    setInterval(updateApp, 1000);
    updateApp();
</script>
</body>
</html>
